<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 动态标题将由 article.js 设置 -->
    <title>文章 - GaoXinYang's website</title>
    <link rel="stylesheet" href="article.css">
        <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  
  <!-- 阅读进度条 -->
  <div id="reading-progress" class="reading-progress-bar">
    <div id="progress-bar" class="progress-bar"></div>
  </div>

    <!-- 主内容区域：Flex 布局包含目录和文章内容 -->
    <div class="article-page-container">

        <!-- 固定/粘性定位的 TOC 容器 -->
        <div class="toc-container">
            <h2 class="toc-title">目录</h2>
            <ul class="toc-list" id="tocList">
                <li>生成目录中...</li>
                <!-- 目录项将由 JavaScript 动态生成 -->
            </ul>
        </div>

        <!-- 主文章内容区 -->
        <div class="article-content-wrapper">
            <h1 class="article-title" id="articleTitle">正在拟定标题……</h1>
            <div class="article-meta" id="articleMeta">--</div>
            <div class="article-body" id="articleBody">
                <!-- 文章正文内容将由 JavaScript 动态加载和解析 -->
                <p>正在填充文内容……</p>
            </div>
        </div>

    </div>

    <!-- 图片预览模态框 -->
    <div id="imageModal" class="image-modal">
        <span class="close">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="">
        </div>
        <div class="image-info">
            <span id="imageCaption"></span>
        </div>
    </div>

    <!-- marked 库必须在 article.js 之前加载 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="article.js"></script>
        <script src="/script.js"></script>

</body>
</html>
