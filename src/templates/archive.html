<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归档 - 高新炀的小站</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/pages/archive.css">
</head>
<body>
  <div id="loading-overlay" role="status" aria-label="页面加载中">
    <div class="loading-log">
      <div>[START] 正在等待 JavaScript，这可能需要几秒</div>
    </div>
    <div class="loading-glow"></div>
    <div id="loading-content">
      <span class="loading-title">GaoXinYang</span>
    </div>
  </div>
  <div id="navbar-placeholder"></div>

  <div id="router-view">
    <div class="two-column-layout">
      <aside class="sidebar-profile">
        <div id="personal-card-container"></div>
      </aside>

      <main class="main-content-area">
        <div class="container">
          <h2>归档</h2>
          <p>按时间线浏览本站已发布的文章和作品。</p>

          <div class="archive-toolbar">
            <div class="archive-toolbar-left">
              <label for="archive-year-filter">按年份筛选：</label>
              <select id="archive-year-filter">
                <option value="all">全部年份</option>
              </select>
            </div>
            <button id="archive-reset" type="button" class="btn-secondary">重置</button>
          </div>

          <div id="archive-summary" class="archive-summary"></div>
          <div id="archive-container" class="archive-container"></div>
        </div>
      </main>
    </div>
  </div>

  
  <div id="pageTransition" class="page-transition"></div>

  <div id="footer-placeholder"></div>
  <script src="https://kit.fontawesome.com/a3c3c05703.js" crossorigin="anonymous"></script>
  <script src="https://vercount.one/js" defer></script>
  <script src="/js/entry/main.js" type="module"></script>
</body>
</html>
