<!-- 页脚动态逻辑：站点年龄/更新时间/版权年份 + 不蒜子数据刷新（与 index.html 方法一致） -->
<script>
  (function() {
    // ---------- 原有功能：站点年龄、更新时间、版权年份 ----------
    const siteAgeSpan = document.getElementById('site-age');
    const updateSpan = document.getElementById('footer-update-date');
    if (siteAgeSpan && (!siteAgeSpan.innerText || siteAgeSpan.innerText.trim() === '')) siteAgeSpan.innerText = '加载中...';
    if (updateSpan && (!updateSpan.innerText || updateSpan.innerText.trim() === '')) updateSpan.innerText = '统计中';
    
    if (typeof window.startSiteAgeUpdater === 'function') {
      if (window.siteAgeInterval) clearInterval(window.siteAgeInterval);
      window.startSiteAgeUpdater();
    } else if (typeof startSiteAgeUpdater === 'function') {
      if (window.siteAgeInterval) clearInterval(window.siteAgeInterval);
      startSiteAgeUpdater();
    }
    
    if (typeof window.updateFooterUpdateTime === 'function') {
      window.updateFooterUpdateTime();
    } else if (typeof updateFooterUpdateTime === 'function') {
      updateFooterUpdateTime();
    }
    
    const yearSpan = document.querySelector('.copyright-inner span:first-child');
    if (yearSpan && yearSpan.innerText.includes('2025-2026')) {
      const currentYear = new Date().getFullYear();
      if (currentYear > 2026) yearSpan.innerText = `© 2025-${currentYear} 高新炀`;
    }

    // ---------- 新增：不蒜子数据显示刷新（与 index.html 实现一致） ----------
    function initBusuanziFooter() {
      // 检查是否已存在 busuanzi 对象且可用
      if (typeof busuanzi !== 'undefined' && busuanzi && typeof busuanzi.fetch === 'function') {
        busuanzi.fetch();   // 刷新页脚中的 PV/UV 数据
        return;
      }
      
      // 若未加载不蒜子脚本，则动态加载（与 index.html 路径一致）
      if (!document.querySelector('script[src*="busuanzi.min.js"]')) {
        var script = document.createElement('script');
        script.src = '/js/busuanzi.min.js';
        script.defer = true;
        script.onload = function() {
          if (typeof busuanzi !== 'undefined' && busuanzi.fetch) {
            busuanzi.fetch();
          }
        };
        document.head.appendChild(script);
      } else {
        // 脚本已存在于页面但尚未初始化完成，轮询等待
        var checkInterval = setInterval(function() {
          if (typeof busuanzi !== 'undefined' && busuanzi.fetch) {
            clearInterval(checkInterval);
            busuanzi.fetch();
          }
        }, 100);
        setTimeout(function() { clearInterval(checkInterval); }, 3000);
      }
    }

    // 确保页脚插入 DOM 后执行刷新（此时 footer 元素已存在）
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initBusuanziFooter);
    } else {
      initBusuanziFooter();
    }
  })();
</script>
