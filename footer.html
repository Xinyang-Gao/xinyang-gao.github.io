  <!-- 极简脚本：站点年龄计算 + 最后更新时间获取 + 不蒜子刷新（完全自我依赖，不依赖全局未定义函数） -->
  <script>
    (function() {
      // ---------- 1. 站点运行时间计算 (起始日期: 2025年3月1日，与网站创立一致) ----------
      function updateSiteAge() {
        const ageSpan = document.getElementById('site-age');
        if (!ageSpan) return;
        const startDate = new Date(2025, 2, 1); // 2025年3月1日 (月份0-index)
        const now = new Date();
        const diffYears = now.getFullYear() - startDate.getFullYear();
        const diffMonths = now.getMonth() - startDate.getMonth();
        const diffDays = now.getDate() - startDate.getDate();
        let totalMonths = diffYears * 12 + diffMonths;
        if (diffDays < 0) {
          totalMonths--;
        }
        let display = '';
        if (totalMonths >= 12) {
          const years = Math.floor(totalMonths / 12);
          const months = totalMonths % 12;
          if (months === 0) display = `${years}年`;
          else display = `${years}年${months}个月`;
        } else if (totalMonths > 0) {
          display = `${totalMonths}个月`;
        } else {
          // 不满一个月显示天数
          let dayDiff = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
          display = `${dayDiff}天`;
        }
        ageSpan.innerText = display;
      }
      
      // 初始更新 + 每日自动更新一次
      updateSiteAge();
      setInterval(updateSiteAge, 86400000);
      
      // ---------- 2. 获取数据最后更新时间 (从 /json/statistics.json 读取) ----------
      function fetchLastUpdatedTime() {
        const updateSpan = document.getElementById('footer-update-date');
        if (!updateSpan) return;
        fetch('/json/statistics.json')
          .then(res => {
            if (!res.ok) throw new Error('无法获取统计信息');
            return res.json();
          })
          .then(data => {
            if (data && data.last_updated) {
              updateSpan.innerText = data.last_updated;
            } else {
              updateSpan.innerText = '近期同步';
            }
          })
          .catch(() => {
            updateSpan.innerText = '温暖上线';
          });
      }
      fetchLastUpdatedTime();
      
      // ---------- 3. 版权年份动态更新 (自动扩展至当前年份) ----------
      const copyrightSpan = document.querySelector('.copyright-area span:first-child');
      if (copyrightSpan && copyrightSpan.innerText.includes('2025-2026')) {
        const currentYear = new Date().getFullYear();
        if (currentYear > 2026) {
          copyrightSpan.innerText = `© 2025-${currentYear} 高新炀`;
        }
      }
      
      // ---------- 4. 不蒜子统计 —— 确保页脚pv/uv正常显示 (与全站统一) ----------
      function initBusuanziInFooter() {
        // 如果已经存在busuanzi对象并可用，调用刷新
        if (typeof busuanzi !== 'undefined' && busuanzi && typeof busuanzi.fetch === 'function') {
          busuanzi.fetch();
          return;
        }
        // 动态加载不蒜子脚本，避免重复
        if (!document.querySelector('script[src*="busuanzi.min.js"]')) {
          const script = document.createElement('script');
          script.src = '/js/busuanzi.min.js';
          script.defer = true;
          script.onload = function() {
            if (typeof busuanzi !== 'undefined' && busuanzi.fetch) busuanzi.fetch();
          };
          document.head.appendChild(script);
        } else {
          // 脚本已存在但未就绪，轮询等待
          let checkTimer = setInterval(function() {
            if (typeof busuanzi !== 'undefined' && busuanzi.fetch) {
              clearInterval(checkTimer);
              busuanzi.fetch();
            }
          }, 120);
          setTimeout(() => clearInterval(checkTimer), 4000);
        }
      }
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initBusuanziInFooter);
      } else {
        initBusuanziInFooter();
      }
    })();
  </script>
