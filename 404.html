<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · 页面未找到 - GaoXinYang</title>
  <meta name="description" content="404错误页面 - 您访问的页面不存在。您可以返回首页、返回上一页或通过留言板反馈问题。">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    .error-wrapper {
      max-width: 900px;
      margin: calc(var(--nav-height) + 40px) auto 60px auto;
      padding: 0 20px;
    }

    .error-card {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md), var(--shadow-offset);
      padding: 56px 48px;
      text-align: center;
      transition: background-color var(--transition-normal), 
                  border-color var(--transition-normal),
                  box-shadow var(--transition-normal);
    }

    .error-icon {
      font-size: 4.8rem;
      color: var(--accent-color);
      margin-bottom: 1rem;
      opacity: 0.7;
      display: inline-block;
    }

    .error-card h1 {
      font-size: 6rem;
      margin: 0.2em 0 0.1em;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--accent-color);
      line-height: 1.1;
    }

    .error-card h2 {
      font-size: 1.9rem;
      font-weight: 550;
      margin: 0.25em 0 0.5em;
      border-bottom: none;
      padding-bottom: 0;
      color: var(--text-color);
      letter-spacing: -0.3px;
    }

    .error-desc {
      font-size: 1.1rem;
      margin: 1.6em 0 1.2em;
      color: var(--text-secondary);
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    .error-desc i {
      color: var(--accent-color);
      margin-right: 6px;
    }

    .error-buttons {
      display: flex;
      gap: 18px;
      justify-content: center;
      margin-top: 36px;
      flex-wrap: wrap;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-color);
      color: white;
      padding: 12px 28px;
      border-radius: var(--radius-full);
      font-weight: 550;
      font-size: 0.98rem;
      text-decoration: none;
      transition: all var(--transition-fast) var(--transition-bounce);
      border: none;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .error-btn i {
      font-size: 1rem;
      transition: transform 0.15s ease;
    }

    .error-btn:hover {
      background: var(--accent-light);
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .error-btn:hover i {
      transform: translateX(-3px);
    }

    .error-btn.outline {
      background: transparent;
      color: var(--accent-color);
      border: 1px solid var(--accent-color);
      box-shadow: none;
    }

    .error-btn.outline:hover {
      background: var(--accent-color);
      color: white;
      transform: translateY(-3px);
    }

    .error-btn.outline:hover i {
      transform: translateX(-3px);
      color: white;
    }

    /* 响应式优化 */
    @media (max-width: 768px) {
      .error-card {
        padding: 40px 28px;
      }
      .error-card h1 {
        font-size: 4.5rem;
      }
      .error-card h2 {
        font-size: 1.5rem;
      }
      .error-wrapper {
        margin: calc(var(--nav-height-mobile) + 30px) auto 50px auto;
      }
      .error-buttons {
        gap: 14px;
      }
      .error-btn {
        padding: 10px 22px;
        font-size: 0.9rem;
      }
    }

    @media (max-width: 480px) {
      .error-card {
        padding: 32px 20px;
      }
      .error-card h1 {
        font-size: 3.6rem;
      }
      .error-btn {
        padding: 9px 18px;
      }
    }

    .error-card, .error-btn {
      background: var(--surface-color);
      background-color: var(--surface-color);
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="error-wrapper">
    <div class="error-card">
      <div class="error-icon">
        <i class="fas fa-compass"></i>
      </div>
      <h1>404</h1>
      <h2>页面未找到</h2>
      <div class="error-desc"> 你访问的页面可能已被移动、删除，或网址输入有误</div>
      <div class="error-buttons">
        <button class="error-btn outline" id="goBackBtn">
          <i class="fas fa-arrow-left"></i> 返回上一页
        </button>
        <a href="https://github.com/Xinyang-Gao/xinyang-gao.github.io/issues/new" target="_blank" rel="noopener noreferrer" class="error-btn outline">
          <i class="fas fa-bug"></i> 反馈问题
        </a>
        <a href="/contact.html" class="error-btn outline">
          <i class="fas fa-comment"></i> 留言板
        </a>
      </div>
    </div>
  </div>

  <button id="backToTopBtn" class="back-to-top-btn" title="返回顶部">↑</button>
  <div id="pageTransition" class="page-transition"></div>
  <div id="footer-placeholder"></div>

  <script src="//cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js" defer></script>
  <script src="script.js"></script>

  <script>
    (function() {
      // 主题同步
      const savedTheme = localStorage.getItem('theme');
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      } else if (systemPrefersDark) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        if(!document.documentElement.getAttribute('data-theme')) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      }

      // 加载导航栏 + 页脚
      async function loadNavbarAndFooter() {
        if (typeof loadNavbar === 'function') {
          try {
            await loadNavbar();
          } catch(e) { console.warn('loadNavbar 执行失败', e); }
        }
        if (typeof loadFooter === 'function') {
          try {
            await loadFooter();
          } catch(e) { console.warn('loadFooter 执行失败', e); }
        }
      }
      
      // 返回顶部逻辑
      function setupBackToTop() {
        const backBtn = document.getElementById('backToTopBtn');
        if (!backBtn) return;
        const toggleBackBtn = () => {
          if (window.scrollY > 400) {
            backBtn.classList.add('show');
          } else {
            backBtn.classList.remove('show');
          }
        };
        window.addEventListener('scroll', toggleBackBtn);
        backBtn.addEventListener('click', () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        toggleBackBtn();
      }

      // 返回上一页 若无法后退则跳转首页
      function initGoBack() {
        const backBtn = document.getElementById('goBackBtn');
        if (!backBtn) return;
        backBtn.addEventListener('click', (e) => {
          e.preventDefault();
          if (window.history.length > 1) {
            window.history.back();
          } else {
            const fallbackUrl = '/index.html';
            window.location.href = fallbackUrl;
          }
        });
      }

      // 监听主题变更
      window.addEventListener('storage', (e) => {
        if (e.key === 'theme' && e.newValue) {
          document.documentElement.setAttribute('data-theme', e.newValue);
          const checkbox = document.getElementById('theme-toggle-checkbox');
          if (checkbox) checkbox.checked = (e.newValue === 'dark');
        }
      });

      // 页面加载完全后执行
      document.addEventListener('DOMContentLoaded', async () => {
        await loadNavbarAndFooter();
        setupBackToTop();
        initGoBack();
        
        const pageTransitionDiv = document.getElementById('pageTransition');
        if (pageTransitionDiv) {
          setTimeout(() => {
            pageTransitionDiv.style.opacity = '0';
          }, 200);
        }
        
        // 告知 body 已加载
        document.body.setAttribute('data-loaded', 'true');
      });
    })();
  </script>
</body>
</html>
