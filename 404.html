<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面未找到 - GaoXinYang's website</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 404 页面特定微调，复用全局变量 */
    .error-container {
      max-width: 750px;
      margin: calc(var(--nav-height) + 35px) auto 60px auto;
      background: white;
      border: var(--border-width) solid var(--border-color);
      box-shadow: var(--shadow-main), var(--shadow-offset), -var(--shadow-offset);
      padding: 55px 45px;
      position: relative;
      border-radius: var(--border-radius-container);
      text-align: center;
      transition: background-color var(--transition-normal) var(--transition-ease), 
                  border-color var(--transition-normal) var(--transition-ease);
    }

    [data-theme="dark"] .error-container {
      background: #222;
    }

    .error-container h1 {
      font-size: 5rem;
      margin: 0.3em 0 0.2em;
      color: var(--accent-color);
      font-weight: 700;
      letter-spacing: 4px;
    }

    .error-container h2 {
      font-size: 1.9rem;
      margin: 0.5em 0;
      color: var(--accent-color);
      border-bottom: none;
      padding-bottom: 0;
    }

    .error-container p {
      font-size: var(--font-size-base);
      margin: 1.5em 0;
      color: var(--text-color);
    }

    [data-theme="dark"] .error-container p {
      color: #d0d0d0;
    }

    .error-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .error-btn {
      display: inline-block;
      background: var(--accent-color);
      color: white;
      padding: 12px 28px;
      text-decoration: none;
      border-radius: 6px;
      transition: all var(--transition-fast) var(--transition-ease);
      font-weight: 500;
      font-size: 1rem;
      border: none;
      cursor: pointer;
    }

    .error-btn:hover {
      background: var(--link-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--item-hover-shadow);
    }

    .error-btn.outline {
      background: transparent;
      color: var(--accent-color);
      border: 1px solid var(--accent-color);
    }

    .error-btn.outline:hover {
      background: var(--accent-color);
      color: white;
    }

    .decoration-emoji {
      font-size: 4rem;
      opacity: 0.25;
      user-select: none;
      margin: 10px 0;
    }

    @media (max-width: 768px) {
      .error-container {
        padding: 35px 25px;
        margin: calc(var(--nav-height-mobile) + 25px) 20px 50px;
      }
      .error-container h1 { font-size: 4rem; }
      .error-container h2 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <!-- 导航栏占位符，由 js 动态加载，与全局一致 -->
  <div id="navbar-placeholder"></div>

  <div class="error-container">
    <div class="decoration-emoji">ERROR</div>
    <h1>404</h1>
    <h2>—————— 页面未找到 ——————</h2>
    <p>诶呀……没找到这个页面呀，也许是网址输错了？<br>（或者我不小心写错代码了）</p>
    <div class="error-buttons">
      <a href="/index.html" class="error-btn">返回首页</a>
      <a href="https://github.com/Xinyang-Gao/xinyang-gao.github.io/issues/new" target="_blank" class="error-btn outline">反馈问题</a>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // 确保导航栏加载和主题一致性
    document.addEventListener('DOMContentLoaded', async () => {
      // 预置主题（防止闪烁）
      const savedTheme = localStorage.getItem('theme');
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      } else if (systemPrefersDark) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }

      // 加载导航栏（如果 navbar-placeholder 存在）
      if (document.getElementById('navbar-placeholder')) {
        await loadNavbar();
      }
      
      // 激活导航高亮（当前页面为 404 时不需要高亮具体项，但保持主题切换按钮可用）
      if (typeof NavigationManager !== 'undefined' && NavigationManager.initNavigation) {
        NavigationManager.initNavigation();
      }
      if (typeof ScrollManager !== 'undefined' && ScrollManager.initBackToTopButton) {
        ScrollManager.initBackToTopButton();
      }
      document.body.setAttribute('data-loaded', 'true');
    });
  </script>
</body>
</html>
