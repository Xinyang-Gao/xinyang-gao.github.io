<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="高新炀的个人网站 - 学生、开发者、写作者，用代码和文字探索世界">
  <title>高新炀 · 个人网站</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/pages/home.css">
</head>

<body>

  <div id="loading-overlay" role="status" aria-label="页面加载中">
    <div class="loading-log">
      <div>[START] 正在等待 JavaScript，这可能需要几秒</div>
    </div>
    <div class="loading-glow"></div>
    <div id="loading-content">
      <span class="loading-title">GaoXinYang</span>
    </div>
  </div>

  <noscript>
    <div
      style="background: #b45b63; color: white; text-align: center; padding: 12px 16px; font-size: 0.9rem; position: sticky; top: 0; z-index: 1000;">
      诶呀！您的浏览器似乎未启用 JavaScript，或您是 AI （或者爬虫）？<br>不过别担心，我们提供无需 JS 即可访问全部内容的静态镜像页面，请移步：
      <a href="/nojs.html" style="color: white; font-weight: bold; text-decoration: underline;">静态镜像版 /nojs.html</a>
      以获得更好的体验 。
    </div>
  </noscript>

  <div id="navbar-placeholder"></div>

  <div id="router-view">
    <div class="two-column-layout">
      <aside class="sidebar-profile">
        <div id="personal-card-container"></div>
      </aside>

      <main class="main-content-area" role="main" aria-live="polite">
        <div class="container">
          <div class="hero landing-hero">
            <div class="eyebrow">WELCOME</div>
            <h1>GaoXinYang's Website</h1>
            <p class="hero-copy">谢谢你在茫茫互联网世界中找到我</p>
            <div class="hero-actions">
              <a href="#blogHome" class="button button-primary">进入首页</a>
              <a href="/about/" class="button button-secondary">了解我</a>
            </div>
            <div class="scroll-indicator"><i class="fas fa-chevron-down"></i> 继续下滑，进入博客</div>
          </div>

          <section class="blog-home-intro" id="blogHome">
            <div class="section-eyebrow">HOME</div>
            <h2>最新文章与作品</h2>
            <p class="section-copy">这里有最新文章、作品与主题标签。每次下滑，都是一段新的文字旅程。</p>
          </section>

          <div class="stats-grid" id="statsContainer">
            <div class="stat-card">
              <div class="stat-icon"><i class="fas fa-spinner fa-pulse"></i></div>
              <div class="stat-number">—</div>
              <div class="stat-label">文章总数</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon"><i class="fas fa-feather-alt"></i></div>
              <div class="stat-number">—</div>
              <div class="stat-label">总字数</div>
              <div class="stat-sub">字里行间</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon"><i class="fas fa-cube"></i></div>
              <div class="stat-number">—</div>
              <div class="stat-label">作品数量</div>
            </div>
          </div>

          <div class="tags-showcase">
            <div class="tags-section">
              <h3><i class="fas fa-book-open"></i> 文章星系</h3>
              <div id="articleTagsList" class="tags-list">
                <span class="tag">加载中...</span>
              </div>
            </div>
            <div class="tags-section">
              <h3><i class="fas fa-code"></i> 创意工坊</h3>
              <div id="workTagsList" class="tags-list">
                <span class="tag">加载中...</span>
              </div>
            </div>
          </div>

          <div class="last-update-badge" id="statsUpdateBadge"></div>

          <div class="quick-site-nav">
            <div class="quick-nav-links">
              <a href="/">首页</a>
              <a href="/about/">关于</a>
              <a href="/articles/">文章</a>
              <a href="/archive/">归档</a>
              <a href="/works/">作品</a>
              <a href="/friends/">友链</a>
              <a href="/contact/">留言板</a>
            </div>
          </div>

          <div class="busuanzi-stats">
            <div class="stat-item">
              <i class="fas fa-chart-line"></i> 全站总访问量
              <span id="busuanzi_site_pv" class="stat-number">-</span>
              <span style="margin-left: 2px;">次</span>
            </div>
            <div class="stat-item">
              <i class="fas fa-user-friends"></i> 全站总访客数
              <span id="busuanzi_site_uv" class="stat-number">-</span>
              <span style="margin-left: 2px;">人</span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>


  <div id="pageTransition" class="page-transition"></div>

  <script src="https://kit.fontawesome.com/a3c3c05703.js" crossorigin="anonymous"></script>
  <script src="/js/vendor/busuanzi.min.js" defer></script>
  <script src="/js/entry/main.js" type="module"></script>
  <div id="footer-placeholder"></div>
</body>

</html>
