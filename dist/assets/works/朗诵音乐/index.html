<!DOCTYPE html>
<html lang="zh-CN" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《周总理，你在哪里》朗诵</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/works/朗诵音乐/work-style.css">
<style>
        .background-image {
            background-image: url('http://img.cjyun.org/a/10008/201701/4c02d723491c26c88dfb6601f5940b6c.jpeg');
        }
</style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar collapsed">
        <div class="nav-logo" id="navToggle">
            <div class="logo-icon">
                <i class="fas fa-music"></i>
            </div>
            <div class="logo-text">GXY</div>
        </div>
        
        <div class="nav-items">
            <div class="nav-item active">第二组</div>
            <div class="nav-item" onclick="location.href='group3.html'">第三组</div>
        </div>
        
        <div class="nav-actions">
            <div class="action-btn">
                <i class="fas fa-search"></i>
            </div>
            <div class="action-btn">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <div class="main-container navbar-collapsed">
        <!-- 左侧图片区域 -->
        <div class="image-section">
            <div class="image-container">
                <div class="background-image"></div>
            </div>
        </div>
        
        <!-- 右侧播放器区域 -->
        <div class="player-section">
            <div class="player-container">
                <h2>第二组 朗诵</h2>
                
                <div class="song-info">
                    <div class="song-title">周总理，你在哪里</div>
                    <div class="song-artist">柯岩</div>
                </div>
                
                <div class="netease-player">
                    <iframe 
                        frameborder="no" 
                        border="0" 
                        marginwidth="0" 
                        marginheight="0" 
                        width="100%" 
                        height="86" 
                        src="//music.163.com/outchain/player?type=2&id=1446768344&auto=1&height=66">
                    </iframe>
                </div>
                
                <div class="player-controls">
                    <button class="control-btn" onclick="refreshPlayer()">
                        <i class="fas fa-redo"></i> 刷新
                    </button>
                </div>
                
                <div class="playlist-info">
                    当前播放: Secret Garden - Song From A Secret Garden
                </div>
            </div>
        </div>
    </div>

    <script>
        // 导航栏切换功能
        const navToggle = document.getElementById('navToggle');
        const navbar = document.querySelector('.navbar');
        const mainContainer = document.querySelector('.main-container');
        
        navToggle.addEventListener('click', function() {
            navbar.classList.toggle('collapsed');
            mainContainer.classList.toggle('navbar-collapsed');
        });

        // 刷新播放器
        function refreshPlayer() {
            const iframe = document.querySelector('.netease-player iframe');
            iframe.src = iframe.src;
            
            // 添加反馈效果
            const btn = document.querySelector('.control-btn');
            btn.innerHTML = '<i class="fas fa-check"></i> 已刷新';
            btn.style.background = 'rgba(0, 247, 255, 0.2)';
            
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-redo"></i> 刷新';
                btn.style.background = 'rgba(0, 0, 0, 0.2)';
            }, 1500);
        }

        // 页面加载完成后显示播放器
        document.addEventListener('DOMContentLoaded', function() {
            console.log('音乐播放器已加载 - Secret Garden');
        });
    </script>
</body>
</html>
