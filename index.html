<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="高新炀的个人网站 - 学生、开发者、写作者，用代码和文字探索世界">
  <title>高新炀 · 个人网站</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
/* 统计卡片网格 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 24px;
  margin: 32px 0 24px;
}

.stat-card {
  background: var(--surface-color);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 24px 16px;
  text-align: center;
  transition: all var(--transition-normal);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}

.stat-card:hover {
  transform: translateY(-6px);
  border-color: var(--accent-color);
  box-shadow: var(--shadow-hover);
}

.stat-icon {
  font-size: 2.2rem;
  color: var(--accent-color);
  margin-bottom: 12px;
}

.stat-number {
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--accent-color);
  line-height: 1.2;
  margin-bottom: 6px;
}

.stat-label {
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}

.stat-sub {
  font-size: var(--font-size-xs);
  color: var(--text-secondary);
  margin-top: 6px;
  opacity: 0.8;
}

/* 标签展示区域（双栏：文章星系 / 创意工坊） */
.tags-showcase {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
  margin: 40px 0 32px;
}

.tags-section {
  flex: 1;
  min-width: 200px;
  background: var(--surface-color-secondary);
  border-radius: var(--radius-lg);
  padding: 20px 20px 24px;
  border: 1px solid var(--border-light);
  transition: all var(--transition-normal);
}

.tags-section h3 {
  font-size: 1.3rem;
  margin-top: 0;
  margin-bottom: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-bottom: 2px solid var(--accent-color);
  padding-bottom: 6px;
}

.tags-section h3 i {
  color: var(--accent-color);
}

.tags-list {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 12px;
}

.tags-list .tag {
  background: var(--surface-color);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.tags-list .tag:hover {
  background: var(--accent-color);
  color: white;
  transform: translateY(-3px);
}

/* 灵感语录区域 */
.inspire-quote {
  background: var(--surface-color-secondary);
  border-left: 4px solid var(--accent-color);
  padding: 20px 28px;
  margin: 32px 0;
  border-radius: var(--radius-md);
  font-style: normal;
  transition: all var(--transition-normal);
  box-shadow: var(--shadow-sm);
}

.inspire-quote p {
  margin: 0 0 8px 0;
  font-size: 1.05rem;
  color: var(--text-color);
  display: flex;
  align-items: center;
  gap: 10px;
}

.inspire-quote p i {
  color: var(--accent-color);
  font-size: 1.3rem;
}

.inspire-author {
  text-align: right;
  font-size: 0.9rem;
  color: var(--text-secondary);
  font-weight: 500;
  letter-spacing: 0.5px;
}

/* 最后更新徽章 */
.last-update-badge {
  text-align: center;
  font-size: var(--font-size-xs);
  color: var(--text-secondary);
  margin: 24px 0 12px;
  opacity: 0.7;
  letter-spacing: 0.3px;
}

.last-update-badge i {
  margin-right: 4px;
}

/* 不蒜子统计模块 */
.busuanzi-stats {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 32px;
  margin: 32px 0 16px;
  padding: 16px 20px;
  background: var(--surface-color-secondary);
  border-radius: var(--radius-xl);
  border: 1px solid var(--border-light);
}

.busuanzi-stats .stat-item {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-color);
}

.busuanzi-stats .stat-item i {
  color: var(--accent-color);
  font-size: 1.3rem;
}

.busuanzi-stats .stat-item .stat-number {
  font-size: 1.4rem;
  font-weight: 700;
  margin: 0 4px;
}

/* Hero landing page 样式已在全局 CSS 内定义 */

/* 响应式适配（移动端调整） */
@media (max-width: 768px) {
  .stats-grid {
    gap: 16px;
  }
  .stat-number {
    font-size: 1.8rem;
  }
  .tags-showcase {
    flex-direction: column;
    gap: 24px;
  }
  .busuanzi-stats {
    gap: 20px;
    flex-direction: column;
    align-items: center;
  }
  .hero h1 {
    font-size: 2.4rem;
  }
  .greeting-text {
    font-size: 1rem;
  }
  .bio {
    max-width: 95%;
  }
}

@media (max-width: 480px) {
  .stat-card {
    padding: 18px 12px;
  }
  .stat-number {
    font-size: 1.5rem;
  }
  .tags-section {
    padding: 16px;
  }
  .inspire-quote {
    padding: 16px 20px;
  }
  .busuanzi-stats .stat-item {
    font-size: 0.9rem;
  }
}

/* 暗色模式下的额外优化（确保所有新组件都正确适配） */
[data-theme="dark"] .stat-card,
[data-theme="dark"] .tags-section,
[data-theme="dark"] .inspire-quote,
[data-theme="dark"] .busuanzi-stats {
  background: var(--surface-color);
  border-color: var(--border-color);
}

[data-theme="dark"] .hero-signature {
  background: var(--surface-color-secondary);
  border-color: var(--border-color);
}

[data-theme="dark"] .tags-list .tag {
  background: var(--surface-color-secondary);
}

[data-theme="dark"] .tags-list .tag:hover {
  background: var(--accent-color);
  color: #14141a;
}

</style>
  <!--<script defer src="https://cloud.umami.is/" data-website-id="c3085953-4d50-4fa3-89f4-58bdc71c403b"></script>-->
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="two-column-layout">
    <aside class="sidebar-profile">
      <div id="personal-card-container"></div>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="main-content-area" id="mainContent" role="main" aria-live="polite">
      <div class="container">
        <div class="hero landing-hero">
          <div class="eyebrow">WELCOME</div>
          <h1>GaoXinYang's Website</h1>
          <p class="hero-copy">谢谢你在茫茫互联网世界中找到我</p>
          <div class="hero-actions">
            <a href="#blogHome" class="button button-primary">进入首页</a>
            <a href="/about.html" class="button button-secondary">了解我</a>
          </div>
          <div class="scroll-indicator"><i class="fas fa-chevron-down"></i> 继续下滑，进入博客</div>
        </div>

        <section class="blog-home-intro" id="blogHome">
          <div class="section-eyebrow">HOME</div>
          <h2>最新文章与作品</h2>
          <p class="section-copy">这里有最新文章、作品与主题标签。每次下滑，都是一段新的文字旅程。</p>
        </section>

        <!-- 统计卡片容器（由 statistics.json 填充） -->
        <div class="stats-grid" id="statsContainer">
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-spinner fa-pulse"></i></div><div class="stat-number">—</div><div class="stat-label">文章总数</div></div>
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-feather-alt"></i></div><div class="stat-number">—</div><div class="stat-label">总字数</div><div class="stat-sub">字里行间</div></div>
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-cube"></i></div><div class="stat-number">—</div><div class="stat-label">作品数量</div></div>
        </div>
        <!-- 标签云区域 -->
        <div class="tags-showcase">
          <div class="tags-section">
            <h3><i class="fas fa-book-open"></i> 文章星系</h3>
            <div id="articleTagsList" class="tags-list">
              <span class="tag">加载中...</span>
            </div>
          </div>
          <div class="tags-section">
            <h3><i class="fas fa-code"></i> 创意工坊</h3>
            <div id="workTagsList" class="tags-list">
              <span class="tag">加载中...</span>
            </div>
          </div>
        </div>
        
        <div class="last-update-badge" id="statsUpdateBadge"></div>
        
        <!-- 不蒜子统计模块 (全站访问量/访客数) -->
        <div class="busuanzi-stats">
          <div class="stat-item">
            <i class="fas fa-chart-line"></i> 全站总访问量
            <span id="busuanzi_site_pv" class="stat-number">-</span>
            <span style="margin-left: 2px;">次</span>
          </div>
          <div class="stat-item">
            <i class="fas fa-user-friends"></i> 全站总访客数
            <span id="busuanzi_site_uv" class="stat-number">-</span>
            <span style="margin-left: 2px;">人</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <button id="backToTopBtn" class="back-to-top-btn" title="返回顶部">↑</button>
  <div id="pageTransition" class="page-transition"></div>

  <script src="https://kit.fontawesome.com/a3c3c05703.js" crossorigin="anonymous"></script>
  <script src="/js/busuanzi.min.js" defer></script>
  <script src="/js/main.js" type="module"></script>
  <div id="footer-placeholder"></div>

  <script>
    (function() {
      // 辅助函数：HTML转义
      function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        });
      }
      
      // 渲染统计卡片 + 标签云（增强版：添加可跳转属性）
      function loadStatisticsAndTags() {
        fetch('/json/statistics.json')
          .then(res => {
            if (!res.ok) throw new Error('统计加载失败');
            return res.json();
          })
          .then(stat => {
            const totalArticles = stat.total_articles ?? 0;
            const totalWords = stat.total_word_count ?? 0;
            const totalWorks = stat.total_works ?? 0;
            const totalArticleCategories = stat.total_article_categories ?? 0;
            const totalArticleTags = stat.total_article_tags ?? 0;
            const totalWorkTags = stat.total_work_tags ?? 0;
            const lastUpdated = stat.last_updated || '未知';
            
            const statsContainer = document.getElementById('statsContainer');
            if (statsContainer) {
              statsContainer.innerHTML = `
                <div class="stat-card" data-stat-type="articles"><div class="stat-icon"><i class="fas fa-newspaper"></i></div><div class="stat-number">${totalArticles}</div><div class="stat-label">文章总数</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-number">${totalWords.toLocaleString()}</div><div class="stat-label">总字数</div></div>
                <div class="stat-card" data-stat-type="works"><div class="stat-icon"><i class="fas fa-rocket"></i></div><div class="stat-number">${totalWorks}</div><div class="stat-label">作品数量</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-bookmark"></i></div><div class="stat-number">${totalArticleCategories}</div><div class="stat-label">文章分类</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-tags"></i></div><div class="stat-number">${totalArticleTags}</div><div class="stat-label">文章标签</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-layer-group"></i></div><div class="stat-number">${totalWorkTags}</div><div class="stat-label">作品标签</div></div>
              `;
            }
            // 处理标签云
            const articleTags = stat.article_tags || [];
            const workTags = stat.work_tags || [];
            const articleTagsContainer = document.getElementById('articleTagsList');
            const workTagsContainer = document.getElementById('workTagsList');
            if (articleTagsContainer) {
              if (articleTags.length) {
                articleTagsContainer.innerHTML = articleTags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
              } else {
                articleTagsContainer.innerHTML = '<span class="tag">暂无标签</span>';
              }
            }
            if (workTagsContainer) {
              if (workTags.length) {
                workTagsContainer.innerHTML = workTags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
              } else {
                workTagsContainer.innerHTML = '<span class="tag">暂无标签</span>';
              }
            }
            const badge = document.getElementById('statsUpdateBadge');
            if (badge) {
              badge.innerHTML = `<i class="far fa-clock"></i> 数据快照 · ${escapeHtml(lastUpdated)}`;
            }
          })
          .catch(err => {
            console.warn('统计卡片加载异常:', err);
            const statsContainer = document.getElementById('statsContainer');
            if (statsContainer) {
              statsContainer.innerHTML = `<div class="stat-card" style="grid-column:1/-1;text-align:center;"><i class="fas fa-cloud-moon"></i> 统计信息正在星海漂流，稍后再来看看吧~</div>`;
            }
          });
      }
      
      // 全局事件委托（统计卡片跳转 + 标签跳转），优先使用无刷新导航
      function bindGlobalNavigateEvents() {
        const navigateTo = (href) => {
          try {
            const full = new URL(href, window.location.href).href;
            if (typeof window.fetchAndReplaceContent === 'function') {
              window.fetchAndReplaceContent(full, true);
            } else {
              window.location.href = full;
            }
          } catch (e) {
            window.location.href = href;
          }
        };

        document.addEventListener('click', function(e) {
          const statCard = e.target.closest('.stat-card[data-stat-type]');
          if (statCard) {
            e.preventDefault();
            const type = statCard.getAttribute('data-stat-type');
            if (type === 'articles') {
              navigateTo('/articles.html');
            } else if (type === 'works') {
              navigateTo('/works.html');
            }
            return;
          }

          const tagEl = e.target.closest('.tags-list .tag');
          if (tagEl) {
            const tagText = tagEl.innerText.trim();
            if (!tagText || tagText === '加载中...' || tagText === '暂无标签') return;
            const isArticleZone = tagEl.closest('#articleTagsList') !== null;
            const isWorkZone = tagEl.closest('#workTagsList') !== null;
            if (isArticleZone) {
              navigateTo(`/articles.html?tags=${encodeURIComponent(tagText)}`);
            } else if (isWorkZone) {
              navigateTo(`/works.html?tags=${encodeURIComponent(tagText)}`);
            }
          }
        });
      }
      
      function initHome() {
        loadStatisticsAndTags();
        bindGlobalNavigateEvents();
      }
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initHome);
      } else {
        initHome();
      }
      
      window.addEventListener('load', function() {
        // 确保不蒜子脚本加载后显示
        if (typeof busuanzi !== 'undefined') busuanzi.fetch();
      });
    })();
  </script>
</body>
</html>
