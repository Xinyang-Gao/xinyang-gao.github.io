<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="高新炀的个人网站 - 学生、开发者、写作者，用代码和文字探索世界">
  <title>高新炀 · 个人网站</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
/* 统计卡片网格 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 24px;
  margin: 32px 0 24px;
}

.stat-card {
  background: var(--surface-color);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 24px 16px;
  text-align: center;
  transition: all var(--transition-normal);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}

.stat-card:hover {
  transform: translateY(-6px);
  border-color: var(--accent-color);
  box-shadow: var(--shadow-hover);
}

.stat-icon {
  font-size: 2.2rem;
  color: var(--accent-color);
  margin-bottom: 12px;
}

.stat-number {
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--accent-color);
  line-height: 1.2;
  margin-bottom: 6px;
}

.stat-label {
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}

.stat-sub {
  font-size: var(--font-size-xs);
  color: var(--text-secondary);
  margin-top: 6px;
  opacity: 0.8;
}

/* 标签展示区域（双栏：文章星系 / 创意工坊） */
.tags-showcase {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
  margin: 40px 0 32px;
}

.tags-section {
  flex: 1;
  min-width: 200px;
  background: var(--surface-color-secondary);
  border-radius: var(--radius-lg);
  padding: 20px 20px 24px;
  border: 1px solid var(--border-light);
  transition: all var(--transition-normal);
}

.tags-section h3 {
  font-size: 1.3rem;
  margin-top: 0;
  margin-bottom: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-bottom: 2px solid var(--accent-color);
  padding-bottom: 6px;
}

.tags-section h3 i {
  color: var(--accent-color);
}

.tags-list {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 12px;
}

.tags-list .tag {
  background: var(--surface-color);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.tags-list .tag:hover {
  background: var(--accent-color);
  color: white;
  transform: translateY(-3px);
}

/* 灵感语录区域 */
.inspire-quote {
  background: var(--surface-color-secondary);
  border-left: 4px solid var(--accent-color);
  padding: 20px 28px;
  margin: 32px 0;
  border-radius: var(--radius-md);
  font-style: normal;
  transition: all var(--transition-normal);
  box-shadow: var(--shadow-sm);
}

.inspire-quote p {
  margin: 0 0 8px 0;
  font-size: 1.05rem;
  color: var(--text-color);
  display: flex;
  align-items: center;
  gap: 10px;
}

.inspire-quote p i {
  color: var(--accent-color);
  font-size: 1.3rem;
}

.inspire-author {
  text-align: right;
  font-size: 0.9rem;
  color: var(--text-secondary);
  font-weight: 500;
  letter-spacing: 0.5px;
}

/* 最近更新区域 */
.recent-section {
  margin: 48px 0 20px;
}

.recent-section h2 {
  font-size: 1.8rem;
  margin-bottom: 24px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  border-bottom: 2px solid var(--accent-color);
  padding-bottom: 6px;
}

.recent-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
}

.recent-posts,
.recent-works {
  background: var(--surface-color-secondary);
  border-radius: var(--radius-lg);
  padding: 20px 20px 24px;
  border: 1px solid var(--border-light);
  transition: all var(--transition-normal);
}

.recent-posts h3,
.recent-works h3 {
  margin-top: 0;
  margin-bottom: 20px;
  font-size: 1.3rem;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--accent-color);
}

.recent-item {
  background: var(--surface-color);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  margin-bottom: 16px;
  cursor: pointer;
  transition: all var(--transition-fast);
  box-shadow: var(--shadow-sm);
}

.recent-item:last-child {
  margin-bottom: 0;
}

.recent-item:hover {
  transform: translateX(4px) translateY(-2px);
  border-color: var(--accent-color);
  box-shadow: var(--shadow-md);
  background: var(--surface-color);
}

.recent-title {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 10px;
  font-weight: 600;
  font-size: 1rem;
  margin-bottom: 8px;
}

.recent-title span i {
  margin-right: 6px;
  color: var(--accent-color);
}

.recent-badge {
  font-size: var(--font-size-xs);
  background: var(--tag-bg);
  padding: 2px 8px;
  border-radius: var(--radius-full);
  color: var(--text-secondary);
  font-weight: normal;
}

.recent-meta {
  font-size: var(--font-size-small);
  color: var(--text-secondary);
  line-height: 1.5;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}

.recent-meta i {
  color: var(--accent-color);
  font-size: 0.8rem;
}

.recent-empty {
  color: var(--text-secondary);
  text-align: center;
  padding: 24px 12px;
  font-size: 0.9rem;
  background: var(--surface-color);
  border-radius: var(--radius-md);
  border: 1px dashed var(--border-color);
}

/* 最后更新徽章 */
.last-update-badge {
  text-align: center;
  font-size: var(--font-size-xs);
  color: var(--text-secondary);
  margin: 24px 0 12px;
  opacity: 0.7;
  letter-spacing: 0.3px;
}

.last-update-badge i {
  margin-right: 4px;
}

/* 不蒜子统计模块 */
.busuanzi-stats {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 32px;
  margin: 32px 0 16px;
  padding: 16px 20px;
  background: var(--surface-color-secondary);
  border-radius: var(--radius-xl);
  border: 1px solid var(--border-light);
}

.busuanzi-stats .stat-item {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-color);
}

.busuanzi-stats .stat-item i {
  color: var(--accent-color);
  font-size: 1.3rem;
}

.busuanzi-stats .stat-item .stat-number {
  font-size: 1.4rem;
  font-weight: 700;
  margin: 0 4px;
}

/* Hero 区域微调（使问候与简介更协调） */
.hero {
  text-align: center;
  margin-bottom: 32px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-light);
}

.hero h1 {
  font-size: 3rem;
  margin: 0.2em 0 0.2em;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-light) 100%);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

.greeting-text {
  font-size: 1.2rem;
  font-weight: 500;
  color: var(--accent-color);
  margin: 8px 0 12px;
}

.bio {
  font-size: 1rem;
  color: var(--text-secondary);
  max-width: 80%;
  margin: 0 auto 12px;
}

.hero-signature {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--tag-bg);
  padding: 8px 20px;
  border-radius: var(--radius-full);
  font-size: 0.9rem;
  color: var(--text-secondary);
  border: 1px solid var(--border-light);
}

.hero-signature i {
  color: var(--accent-color);
}

/* 响应式适配（移动端调整） */
@media (max-width: 768px) {
  .stats-grid {
    gap: 16px;
  }
  .stat-number {
    font-size: 1.8rem;
  }
  .tags-showcase {
    flex-direction: column;
    gap: 24px;
  }
  .recent-grid {
    grid-template-columns: 1fr;
    gap: 24px;
  }
  .busuanzi-stats {
    gap: 20px;
    flex-direction: column;
    align-items: center;
  }
  .hero h1 {
    font-size: 2.4rem;
  }
  .greeting-text {
    font-size: 1rem;
  }
  .bio {
    max-width: 95%;
  }
}

@media (max-width: 480px) {
  .stat-card {
    padding: 18px 12px;
  }
  .stat-number {
    font-size: 1.5rem;
  }
  .tags-section {
    padding: 16px;
  }
  .recent-item {
    padding: 12px;
  }
  .recent-title {
    font-size: 0.95rem;
  }
  .inspire-quote {
    padding: 16px 20px;
  }
  .busuanzi-stats .stat-item {
    font-size: 0.9rem;
  }
}

/* 暗色模式下的额外优化（确保所有新组件都正确适配） */
[data-theme="dark"] .stat-card,
[data-theme="dark"] .tags-section,
[data-theme="dark"] .recent-posts,
[data-theme="dark"] .recent-works,
[data-theme="dark"] .inspire-quote,
[data-theme="dark"] .busuanzi-stats {
  background: var(--surface-color);
  border-color: var(--border-color);
}

[data-theme="dark"] .recent-item {
  background: var(--surface-color-secondary);
  border-color: var(--border-light);
}

[data-theme="dark"] .recent-item:hover {
  background: var(--surface-color);
  border-color: var(--accent-color);
}

[data-theme="dark"] .hero-signature {
  background: var(--surface-color-secondary);
  border-color: var(--border-color);
}

[data-theme="dark"] .tags-list .tag {
  background: var(--surface-color-secondary);
}

[data-theme="dark"] .tags-list .tag:hover {
  background: var(--accent-color);
  color: #14141a;
}

</style>

<body>
  <div id="navbar-placeholder"></div>

  <!-- 全新双栏布局 -->
  <div class="two-column-layout">

          <div class="inspire-author">—— 高新炀</div>
        </div>

        <!-- 最近更新区域 (文章&作品) -->
        <div class="recent-section">
          <h2><i class="fas fa-history"></i> 最近更新</h2>
          <div class="recent-grid">
            <div class="recent-posts">
              <h3><i class="fas fa-pen-fancy"></i> 最新墨迹</h3>
              <div id="recentArticlesList">
                <div class="recent-empty"><i class="fas fa-hourglass-half"></i> 正在拾取星光...</div>

              <h3><i class="fas fa-laptop-code"></i> 最新创作</h3>

        <!-- 不蒜子统计模块 (全站访问量/访客数) -->
        <div class="busuanzi-stats">
          <div class="stat-item">
            <i class="fas fa-chart-line"></i> 全站总访问量
            <span id="busuanzi_site_pv" class="stat-number">-</span>
            <span style="margin-left: 2px;">次</span>
          </div>
          <div class="stat-item">
            <i class="fas fa-user-friends"></i> 全站总访客数
            <span id="busuanzi_site_uv" class="stat-number">-</span>
            <span style="margin-left: 2px;">人</span>

  <button id="backToTopBtn" class="back-to-top-btn" title="返回顶部">↑</button>
  <div id="pageTransition" class="page-transition"></div>

  <script src="/js/busuanzi.min.js" defer></script>
  <script src="/js/script.js"></script>
  <div id="footer-placeholder"></div>

  <script>
    (function() {
      // 辅助函数：HTML转义
      function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        });
      }
      
      // 渲染统计卡片 + 标签云（增强版：添加可跳转属性）
      function loadStatisticsAndTags() {
        fetch('/statistics.json')
          .then(res => {
            if (!res.ok) throw new Error('统计加载失败');
            return res.json();
          })
          .then(stat => {
            const totalArticles = stat.total_articles ?? 0;
            const totalWords = stat.total_word_count ?? 0;
            const totalWorks = stat.total_works ?? 0;
            const lastUpdated = stat.last_updated || '未知';
            
            const statsContainer = document.getElementById('statsContainer');
            if (statsContainer) {
              statsContainer.innerHTML = `
                <div class="stat-card" data-stat-type="articles"><div class="stat-icon"><i class="fas fa-newspaper"></i></div><div class="stat-number">${totalArticles}</div><div class="stat-label">文章总数</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-number">${totalWords.toLocaleString()}</div><div class="stat-label">总字数</div></div>
                <div class="stat-card" data-stat-type="works"><div class="stat-icon"><i class="fas fa-rocket"></i></div><div class="stat-number">${totalWorks}</div><div class="stat-label">作品数量</div></div>
              `;
            }
            // 处理标签云
            const articleTags = stat.article_tags || [];
            const workTags = stat.work_tags || [];
            const articleTagsContainer = document.getElementById('articleTagsList');
            const workTagsContainer = document.getElementById('workTagsList');
            if (articleTagsContainer) {
              if (articleTags.length) {
                articleTagsContainer.innerHTML = articleTags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
              } else {
                articleTagsContainer.innerHTML = '<span class="tag">暂无标签</span>';
              }
            }
            if (workTagsContainer) {
              if (workTags.length) {
                workTagsContainer.innerHTML = workTags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
              } else {
                workTagsContainer.innerHTML = '<span class="tag">暂无标签</span>';
              }
            }
            const badge = document.getElementById('statsUpdateBadge');
            if (badge) {
              badge.innerHTML = `<i class="far fa-clock"></i> 数据快照 · ${escapeHtml(lastUpdated)}`;
            }
          })
          .catch(err => {
            console.warn('统计卡片加载异常:', err);
            const statsContainer = document.getElementById('statsContainer');
            if (statsContainer) {
              statsContainer.innerHTML = `<div class="stat-card" style="grid-column:1/-1;text-align:center;"><i class="fas fa-cloud-moon"></i> 统计信息正在星海漂流，稍后再来看看吧~</div>`;
            }
          });
      }

      // 加载最新文章和作品
      function loadRecentContent() {
        const fetchArticles = fetch('/articles.json').then(res => res.ok ? res.json() : Promise.reject('articles.json不可用'));
        const fetchWorks = fetch('/works.json').then(res => res.ok ? res.json() : Promise.reject('works.json不可用'));
        
        Promise.allSettled([fetchArticles, fetchWorks]).then(results => {
          let articlesData = results[0].status === 'fulfilled' ? results[0].value : null;
          let worksData = results[1].status === 'fulfilled' ? results[1].value : null;
          
          let articles = [];
          let works = [];
          if (articlesData && articlesData.articles) {
            articles = articlesData.articles;
          }
          if (worksData && worksData.works) {
            works = worksData.works;
          }
          
          const sortByDate = (a,b) => new Date(b.date) - new Date(a.date);
          articles.sort(sortByDate);
          works.sort(sortByDate);
          const latestArticles = articles.slice(0, 5);
          const latestWorks = works.slice(0, 5);
          
          renderRecentList('recentArticlesList', latestArticles, 'article');
          renderRecentList('recentWorksList', latestWorks, 'work');
        }).catch(err => {
          console.error('最近内容加载失败:', err);
          const artContainer = document.getElementById('recentArticlesList');
          if (artContainer) artContainer.innerHTML = '<div class="recent-empty"><i class="fas fa-sad-tear"></i> 内容加载失败，刷新试试</div>';
          const workContainer = document.getElementById('recentWorksList');
          if (workContainer) workContainer.innerHTML = '<div class="recent-empty"><i class="fas fa-tools"></i> 暂时无法获取作品</div>';
        });
      }
      
      function renderRecentList(containerId, items, type) {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (!items || items.length === 0) {
          container.innerHTML = '<div class="recent-empty"><i class="far fa-star"></i> 暂无新动态，敬请期待～</div>';
          return;
        }
        const html = items.map(item => {
          const title = escapeHtml(item.title || '未命名');
          const date = item.date ? escapeHtml(item.date) : '';
          let desc = item.description ? escapeHtml(item.description.substring(0, 85)) : '';
          if (desc.length >= 85) desc += '…';
          
          if (type === 'article') {
            const articleUrl = item.url || '';
            return `
              <div class="recent-item" data-type="article" data-url="${escapeHtml(articleUrl)}">
                <div class="recent-title">
                  <span><i class="far fa-file-alt" style="margin-right: 8px; color: var(--accent-color);"></i>${title}</span>
                  ${date ? `<span class="recent-badge">${date}</span>` : ''}
                </div>
                ${desc ? `<div class="recent-meta"><i class="fas fa-feather"></i> ${desc}</div>` : ''}
                <div class="recent-meta" style="margin-top: 8px;"><i class="far fa-clock"></i> 点击阅读</div>
              </div>
            `;
          } else {
            const workInfo = {
              title: item.title,
              description: item.description || '',
              link: item.link || '',
              tags: item.tags || item.tag || []
            };
            const workInfoStr = encodeURIComponent(JSON.stringify(workInfo));
            return `
              <div class="recent-item" data-type="work" data-work-info="${workInfoStr}">
                <div class="recent-title">
                  <span><i class="fas fa-cube" style="margin-right: 8px; color: var(--accent-color);"></i>${title}</span>
                  ${date ? `<span class="recent-badge">${date}</span>` : ''}
                </div>
                ${desc ? `<div class="recent-meta"><i class="fas fa-code-branch"></i> ${desc}</div>` : ''}
                <div class="recent-meta" style="margin-top: 8px;"><i class="fas fa-mouse-pointer"></i> 点击查看详情</div>
              </div>
            `;
          }
        }).join('');
        container.innerHTML = html;
        attachRecentEvents(container);
      }
      
      function attachRecentEvents(container) {
        const items = container.querySelectorAll('.recent-item');
        items.forEach(el => {
          el.removeEventListener('click', recentClickHandler);
          el.addEventListener('click', recentClickHandler);
        });
      }
      
      function recentClickHandler(e) {
        const target = e.currentTarget;
        const type = target.dataset.type;
        if (type === 'article') {
          const url = target.dataset.url;
          if (url && url.trim()) {
            window.open(url, '_blank');
          } else {
            console.warn('文章链接无效');
          }
        } else if (type === 'work') {
          const workInfoRaw = target.dataset.workInfo;
          if (workInfoRaw) {
            try {
              const workInfo = JSON.parse(decodeURIComponent(workInfoRaw));
              if (typeof PageManager !== 'undefined' && PageManager.showWorkDetails) {
                PageManager.showWorkDetails(workInfo);
              } else {
                alert(`${workInfo.title}\n${workInfo.description || '暂无描述'}`);
                if (workInfo.link) window.open(workInfo.link, '_blank');
              }
            } catch(e) {
              console.error('作品详情解析失败');
            }
          }
        }
      }
      
      // 全局事件委托（统计卡片跳转 + 标签跳转）
      function bindGlobalNavigateEvents() {
        document.addEventListener('click', function(e) {
          const statCard = e.target.closest('.stat-card[data-stat-type]');
          if (statCard) {
            e.preventDefault();
            const type = statCard.getAttribute('data-stat-type');
            if (type === 'articles') {
              window.location.href = '/articles.html';
            } else if (type === 'works') {
              window.location.href = '/works.html';
            }
            return;
          }
          
          const tagEl = e.target.closest('.tags-list .tag');
          if (tagEl) {
            const tagText = tagEl.innerText.trim();
            if (!tagText || tagText === '加载中...' || tagText === '暂无标签') return;
            const isArticleZone = tagEl.closest('#articleTagsList') !== null;
            const isWorkZone = tagEl.closest('#workTagsList') !== null;
            if (isArticleZone) {
              window.location.href = `/articles.html?tags=${encodeURIComponent(tagText)}`;
            } else if (isWorkZone) {
              window.location.href = `/works.html?tags=${encodeURIComponent(tagText)}`;
            }
          }
        });
      }
      
      function initHome() {
        loadStatisticsAndTags();
        loadRecentContent();
        bindGlobalNavigateEvents();
      }
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initHome);
      } else {
        initHome();
      }
      
      window.addEventListener('load', function() {
        const containers = ['recentArticlesList', 'recentWorksList'];
        containers.forEach(id => {
          const cont = document.getElementById(id);
          if (cont && cont.querySelectorAll('.recent-item').length) attachRecentEvents(cont);
        });
        // 确保不蒜子脚本加载后显示
        if (typeof busuanzi !== 'undefined') busuanzi.fetch();
      });
    })();
  </script>
</body>
</html>
