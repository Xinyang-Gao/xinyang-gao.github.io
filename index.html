<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="高新炀的个人网站 - 学生、开发者、写作者，用代码和文字探索世界">
  <title>高新炀 · 个人网站</title>
  <style>
    /* 引入外部CSS */
    @import url("/css/style.css");
    
    /* 重置和基础样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: var(--font-family);
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      overflow-x: hidden;
    }
    
    /* 现代化网格布局容器 */
    .modern-container {
      display: grid;
      grid-template-columns: 1fr min(1400px, 95%) 1fr;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }
    
    .modern-container > * {
      grid-column: 2;
    }
    
    /* 首屏大标题区域 */
    .hero-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 10vh 20px;
      position: relative;
      background: var(--bg-color);
      overflow: hidden;
      min-height: 100vh;
      place-self: stretch;
    }
    
    .hero-title {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 700;
      margin: 0 0 1rem 0;
      color: var(--accent-color);
      line-height: 1.1;
      letter-spacing: -0.02em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
      animation: fadeInUp 0.8s ease-out;
    }
    
    .hero-subtitle {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      color: var(--text-secondary);
      margin-bottom: 2rem;
      font-weight: 400;
      animation: fadeInUp 0.8s ease-out 0.2s both;
      max-width: 600px;
    }
    
    .hero-description {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto 2rem;
      animation: fadeInUp 0.8s ease-out 0.3s both;
      line-height: 1.7;
    }
    
    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      animation: bounce 2s infinite;
      cursor: pointer;
    }
    
    .scroll-arrow {
      width: 24px;
      height: 24px;
      border: 2px solid var(--accent-color);
      border-left: none;
      border-top: none;
      transform: rotate(45deg);
    }
    
    /* 主内容区域 */
    .main-content {
      padding: clamp(4rem, 8vh, 6rem) 20px;
      background: var(--bg-color);
    }
    
    .content-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: clamp(2rem, 4vw, 3rem);
      max-width: 1400px;
      margin: 0 auto;
    }
    
    /* 主内容卡片 - 文章区 */
    .main-content-card {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: clamp(1.5rem, 4vw, 2.5rem);
      box-shadow: var(--shadow-md);
      transition: all var(--transition-normal);
      display: flex;
      flex-direction: column;
      min-height: 600px;
    }
    
    .main-content-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent-color);
    }
    
    .card-header {
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .card-icon {
      font-size: 1.8rem;
      color: var(--accent-color);
    }
    
    .card-title {
      font-size: 1.8rem;
      margin: 0;
      color: var(--accent-color);
    }
    
    .card-content {
      flex: 1;
    }
    
    /* 侧边栏卡片 - 作品区 */
    .sidebar-card {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: clamp(1.5rem, 4vw, 2.5rem);
      box-shadow: var(--shadow-md);
      transition: all var(--transition-normal);
      display: flex;
      flex-direction: column;
      min-height: 600px;
    }
    
    .sidebar-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent-color);
    }
    
    /* 统计卡片网格 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: clamp(0.8rem, 2vw, 1.2rem);
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1rem 0.8rem;
      text-align: center;
      transition: all var(--transition-normal);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .stat-card:hover {
      transform: translateY(-6px);
      border-color: var(--accent-color);
      box-shadow: var(--shadow-hover);
    }

    .stat-icon {
      font-size: 1.5rem;
      color: var(--accent-color);
      margin-bottom: 0.6rem;
    }

    .stat-number {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-color);
      line-height: 1.2;
      margin-bottom: 0.3rem;
    }

    .stat-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
    }

    .stat-sub {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 0.3rem;
      opacity: 0.8;
    }

    /* 标签展示区域 */
    .tags-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 1rem;
    }

    .tags-list .tag {
      background: var(--surface-color-secondary);
      color: var(--text-color);
      padding: 0.4rem 0.8rem;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 1px solid var(--border-color);
    }

    .tags-list .tag:hover {
      background: var(--accent-color);
      color: white;
      border-color: var(--accent-color);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    /* 灵感语录区域 */
    .inspire-quote {
      background: var(--surface-color-secondary);
      border-left: 4px solid var(--accent-color);
      padding: 1.2rem;
      border-radius: var(--radius-md);
      transition: all var(--transition-normal);
      box-shadow: var(--shadow-sm);
      margin: 1.2rem 0;
    }

    .inspire-quote p {
      margin: 0 0 0.8rem 0;
      font-size: 1rem;
      color: var(--text-color);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.6;
    }

    .inspire-quote p i {
      color: var(--accent-color);
      font-size: 1.2rem;
      margin-top: 4px;
    }

    .inspire-author {
      text-align: right;
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* 最近更新区域 */
    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .recent-item {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 1rem;
      cursor: pointer;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .recent-item:hover {
      transform: translateX(4px) translateY(-2px);
      border-color: var(--accent-color);
      box-shadow: var(--shadow-md);
    }

    .recent-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      color: var(--accent-color);
    }

    .recent-title i {
      margin-right: 0.5rem;
      color: var(--accent-color);
    }

    .recent-badge {
      font-size: 0.75rem;
      background: var(--tag-bg);
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-full);
      color: var(--text-secondary);
      font-weight: normal;
    }

    .recent-meta {
      font-size: 0.85rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 0.3rem;
    }

    .recent-meta i {
      color: var(--accent-color);
      font-size: 0.85rem;
    }

    .recent-empty {
      color: var(--text-secondary);
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.85rem;
      background: var(--surface-color);
      border-radius: var(--radius-md);
      border: 1px dashed var(--border-color);
    }

    /* 不蒜子统计模块 */
    .busuanzi-stats {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: clamp(1.5rem, 4vw, 2.5rem);
      margin: 2.5rem 0 1rem;
      padding: 1.2rem 1.5rem;
      background: var(--surface-color-secondary);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-light);
    }

    .busuanzi-stats .stat-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-color);
    }

    .busuanzi-stats .stat-item i {
      color: var(--accent-color);
      font-size: 1.2rem;
    }

    .busuanzi-stats .stat-item .stat-number {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0 0.25rem;
    }

    /* 最后更新徽章 */
    .last-update-badge {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin: 1.5rem 0 1rem;
      opacity: 0.7;
      letter-spacing: 0.3px;
    }

    .last-update-badge i {
      margin-right: 0.25rem;
    }

    /* 动画定义 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0) translateX(-50%);
      }
      40% {
        transform: translateY(-10px) translateX(-50%);
      }
      60% {
        transform: translateY(-5px) translateX(-50%);
      }
    }
    
    /* 响应式调整 */
    @media (max-width: 1024px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
      
      .hero-section {
        min-height: 80vh;
        padding: 5vh 20px;
      }
      
      .busuanzi-stats {
        flex-direction: column;
        align-items: center;
      }
    }
    
    @media (max-width: 480px) {
      .hero-title {
        font-size: 2.2rem;
      }
      
      .hero-subtitle {
        font-size: 1.1rem;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
  <script defer src="https://cloud.umami.is/" data-website-id="c3085953-4d50-4fa3-89f4-58bdc71c403b"></script>
</head>
<body>
  <div class="modern-container">
    <div id="navbar-placeholder"></div>

    <!-- 首屏英雄区域 -->
    <section class="hero-section">
      <h1 class="hero-title">高新炀</h1>
      <p class="hero-subtitle">学生 · 开发者 · 探索者</p>
      <p class="hero-description">用代码和文字探索世界，在技术与创作的交汇处寻找灵感。这里是记录思考、分享知识的地方。</p>
      <div class="scroll-indicator" onclick="scrollToContent()">
        <div class="scroll-arrow"></div>
        <span>滑动查看</span>
      </div>
    </section>

    <!-- 主内容区域 -->
    <main class="main-content">
      <div class="content-grid">
        <!-- 主内容卡片 - 文章区 -->
        <div class="main-content-card">
          <div class="card-header">
            <div class="card-icon"><i class="fas fa-pen-fancy"></i></div>
            <h3 class="card-title">文章世界</h3>
          </div>
          <div class="card-content">
            <!-- 统计卡片网格 -->
            <div class="stats-grid" id="statsContainer">
              <div class="stat-card"><div class="stat-icon"><i class="fas fa-spinner fa-pulse"></i></div><div class="stat-number">—</div><div class="stat-label">文章总数</div></div>
              <div class="stat-card"><div class="stat-icon"><i class="fas fa-feather-alt"></i></div><div class="stat-number">—</div><div class="stat-label">总字数</div><div class="stat-sub">字里行间</div></div>
              <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-number">—</div><div class="stat-label">阅读量</div></div>
            </div>
            
            <!-- 文章分类标签 -->
            <div class="tags-section">
              <h4><i class="fas fa-book-open"></i> 文章分类</h4>
              <div id="articleTagsList" class="tags-list">
                <span class="tag">加载中...</span>
              </div>
            </div>
            
            <!-- 最新文章列表 -->
            <div class="recent-section">
              <h4><i class="fas fa-history"></i> 最新文章</h4>
              <div id="recentArticlesList" class="recent-list">
                <div class="recent-empty"><i class="fas fa-hourglass-half"></i> 正在拾取星光...</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 侧边栏卡片 - 作品区 -->
        <div class="sidebar-card">
          <div class="card-header">
            <div class="card-icon"><i class="fas fa-laptop-code"></i></div>
            <h3 class="card-title">项目作品</h3>
          </div>
          <div class="card-content">
            <!-- 作品统计 -->
            <div class="stats-grid">
              <div class="stat-card"><div class="stat-icon"><i class="fas fa-cube"></i></div><div class="stat-number">—</div><div class="stat-label">作品数量</div></div>
              <div class="stat-card"><div class="stat-icon"><i class="fas fa-code-branch"></i></div><div class="stat-number">—</div><div class="stat-label">技术栈</div></div>
            </div>
            
            <!-- 项目类型标签 -->
            <div class="tags-section">
              <h4><i class="fas fa-code"></i> 项目类型</h4>
              <div id="workTagsList" class="tags-list">
                <span class="tag">加载中...</span>
              </div>
            </div>
            
            <!-- 最新项目列表 -->
            <div class="recent-section">
              <h4><i class="fas fa-rocket"></i> 最新项目</h4>
              <div id="recentWorksList" class="recent-list">
                <div class="recent-empty"><i class="fas fa-microchip"></i> 正在编译创意...</div>
              </div>
            </div>
            
            <!-- 灵感语录区域 -->
            <div class="inspire-quote">
              <p><i class="fas fa-quote-left"></i> 代码改变世界，文字记录生活。在每一次调试与写作中，发现新的可能性。</p>
              <div class="inspire-author">—— 高新炀</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 不蒜子统计模块 -->
      <div class="busuanzi-stats">
        <div class="stat-item">
          <i class="fas fa-chart-line"></i> 全站总访问量
          <span id="busuanzi_site_pv" class="stat-number">-</span>
          <span style="margin-left: 2px;">次</span>
        </div>
        <div class="stat-item">
          <i class="fas fa-user-friends"></i> 全站总访客数
          <span id="busuanzi_site_uv" class="stat-number">-</span>
          <span style="margin-left: 2px;">人</span>
        </div>
      </div>
      
      <div class="last-update-badge" id="statsUpdateBadge"></div>
    </main>

    <button id="backToTopBtn" class="back-to-top-btn" title="返回顶部">↑</button>
    <div id="pageTransition" class="page-transition"></div>
  </div>

  <script src="/js/busuanzi.min.js" defer></script>
  <script src="/js/script.js"></script>
  <div id="footer-placeholder"></div>

  <script>
    (function() {
      // 辅助函数：HTML转义
      function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        });
      }
      
      // 渲染统计卡片 + 标签云
      function loadStatisticsAndTags() {
        fetch('/json/statistics.json')
          .then(res => {
            if (!res.ok) throw new Error('统计加载失败');
            return res.json();
          })
          .then(stat => {
            const totalArticles = stat.total_articles ?? 0;
            const totalWords = stat.total_word_count ?? 0;
            const totalWorks = stat.total_works ?? 0;
            const lastUpdated = stat.last_updated || '未知';
            
            const statsContainer = document.getElementById('statsContainer');
            if (statsContainer) {
              statsContainer.innerHTML = `
                <div class="stat-card" data-stat-type="articles"><div class="stat-icon"><i class="fas fa-newspaper"></i></div><div class="stat-number">${totalArticles}</div><div class="stat-label">文章总数</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-number">${totalWords.toLocaleString()}</div><div class="stat-label">总字数</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-eye"></i></div><div class="stat-number">—</div><div class="stat-label">阅读量</div></div>
              `;
            }
            
            // 处理标签云
            const articleTags = stat.article_tags || [];
            const workTags = stat.work_tags || [];
            const articleTagsContainer = document.getElementById('articleTagsList');
            const workTagsContainer = document.getElementById('workTagsList');
            
            if (articleTagsContainer) {
              if (articleTags.length) {
                articleTagsContainer.innerHTML = articleTags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
              } else {
                articleTagsContainer.innerHTML = '<span class="tag">暂无标签</span>';
              }
            }
            
            if (workTagsContainer) {
              if (workTags.length) {
                workTagsContainer.innerHTML = workTags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
              } else {
                workTagsContainer.innerHTML = '<span class="tag">暂无标签</span>';
              }
            }
            
            const badge = document.getElementById('statsUpdateBadge');
            if (badge) {
              badge.innerHTML = `<i class="far fa-clock"></i> 数据快照 · ${escapeHtml(lastUpdated)}`;
            }
          })
          .catch(err => {
            console.warn('统计卡片加载异常:', err);
            const statsContainer = document.getElementById('statsContainer');
            if (statsContainer) {
              statsContainer.innerHTML = `<div class="stat-card" style="grid-column:1/-1;text-align:center;"><i class="fas fa-cloud-moon"></i> 统计信息正在星海漂流，稍后再来看看吧~</div>`;
            }
          });
      }

      // 加载最新文章和作品
      function loadRecentContent() {
        const fetchArticles = fetch('/json/articles.json').then(res => res.ok ? res.json() : Promise.reject('articles.json不可用'));
        const fetchWorks = fetch('/json/works.json').then(res => res.ok ? res.json() : Promise.reject('works.json不可用'));
        
        Promise.allSettled([fetchArticles, fetchWorks]).then(results => {
          let articlesData = results[0].status === 'fulfilled' ? results[0].value : null;
          let worksData = results[1].status === 'fulfilled' ? results[1].value : null;
          
          let articles = [];
          let works = [];
          if (articlesData && articlesData.articles) {
            articles = articlesData.articles;
          }
          if (worksData && worksData.works) {
            works = worksData.works;
          }
          
          const sortByDate = (a,b) => new Date(b.date) - new Date(a.date);
          articles.sort(sortByDate);
          works.sort(sortByDate);
          const latestArticles = articles.slice(0, 5);
          const latestWorks = works.slice(0, 4);
          
          renderRecentList('recentArticlesList', latestArticles, 'article');
          renderRecentList('recentWorksList', latestWorks, 'work');
        }).catch(err => {
          console.error('最近内容加载失败:', err);
          const artContainer = document.getElementById('recentArticlesList');
          if (artContainer) artContainer.innerHTML = '<div class="recent-empty"><i class="fas fa-sad-tear"></i> 内容加载失败，刷新试试</div>';
          const workContainer = document.getElementById('recentWorksList');
          if (workContainer) workContainer.innerHTML = '<div class="recent-empty"><i class="fas fa-tools"></i> 暂时无法获取作品</div>';
        });
      }
      
      function renderRecentList(containerId, items, type) {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (!items || items.length === 0) {
          container.innerHTML = '<div class="recent-empty"><i class="far fa-star"></i> 暂无新动态，敬请期待～</div>';
          return;
        }
        const html = items.map(item => {
          const title = escapeHtml(item.title || '未命名');
          const date = item.date ? escapeHtml(item.date) : '';
          let desc = item.description ? escapeHtml(item.description.substring(0, 85)) : '';
          if (desc.length >= 85) desc += '…';
          
          if (type === 'article') {
            const articleUrl = item.url || '';
            return `
              <div class="recent-item" data-type="article" data-url="${escapeHtml(articleUrl)}">
                <div class="recent-title">
                  <span><i class="far fa-file-alt"></i>${title}</span>
                  ${date ? `<span class="recent-badge">${date}</span>` : ''}
                </div>
                ${desc ? `<div class="recent-meta"><i class="fas fa-feather"></i> ${desc}</div>` : ''}
                <div class="recent-meta" style="margin-top: 0.5rem;"><i class="far fa-clock"></i> 点击阅读</div>
              </div>
            `;
          } else {
            const workInfo = {
              title: item.title,
              description: item.description || '',
              link: item.link || '',
              tags: item.tags || item.tag || []
            };
            const workInfoStr = encodeURIComponent(JSON.stringify(workInfo));
            return `
              <div class="recent-item" data-type="work" data-work-info="${workInfoStr}">
                <div class="recent-title">
                  <span><i class="fas fa-cube"></i>${title}</span>
                  ${date ? `<span class="recent-badge">${date}</span>` : ''}
                </div>
                ${desc ? `<div class="recent-meta"><i class="fas fa-code-branch"></i> ${desc}</div>` : ''}
                <div class="recent-meta" style="margin-top: 0.5rem;"><i class="fas fa-mouse-pointer"></i> 点击查看详情</div>
              </div>
            `;
          }
        }).join('');
        container.innerHTML = html;
        attachRecentEvents(container);
      }
      
      function attachRecentEvents(container) {
        const items = container.querySelectorAll('.recent-item');
        items.forEach(el => {
          el.removeEventListener('click', recentClickHandler);
          el.addEventListener('click', recentClickHandler);
        });
      }
      
      function recentClickHandler(e) {
        const target = e.currentTarget;
        const type = target.dataset.type;
        if (type === 'article') {
          const url = target.dataset.url;
          if (url && url.trim()) {
            window.open(url, '_blank');
          } else {
            console.warn('文章链接无效');
          }
        } else if (type === 'work') {
          const workInfoRaw = target.dataset.workInfo;
          if (workInfoRaw) {
            try {
              const workInfo = JSON.parse(decodeURIComponent(workInfoRaw));
              if (typeof PageManager !== 'undefined' && PageManager.showWorkDetails) {
                PageManager.showWorkDetails(workInfo);
              } else {
                alert(`${workInfo.title}\n${workInfo.description || '暂无描述'}`);
                if (workInfo.link) window.open(workInfo.link, '_blank');
              }
            } catch(e) {
              console.error('作品详情解析失败');
            }
          }
        }
      }
      
      // 全局事件委托
      function bindGlobalNavigateEvents() {
        document.addEventListener('click', function(e) {
          const statCard = e.target.closest('.stat-card[data-stat-type]');
          if (statCard) {
            e.preventDefault();
            const type = statCard.getAttribute('data-stat-type');
            if (type === 'articles') {
              window.location.href = '/articles.html';
            } else if (type === 'works') {
              window.location.href = '/works.html';
            }
            return;
          }
          
          const tagEl = e.target.closest('.tags-list .tag');
          if (tagEl) {
            const tagText = tagEl.innerText.trim();
            if (!tagText || tagText === '加载中...' || tagText === '暂无标签') return;
            const isArticleZone = tagEl.closest('#articleTagsList') !== null;
            const isWorkZone = tagEl.closest('#workTagsList') !== null;
            if (isArticleZone) {
              window.location.href = `/articles.html?tags=${encodeURIComponent(tagText)}`;
            } else if (isWorkZone) {
              window.location.href = `/works.html?tags=${encodeURIComponent(tagText)}`;
            }
          }
        });
      }
      
      function initHome() {
        loadStatisticsAndTags();
        loadRecentContent();
        bindGlobalNavigateEvents();
      }
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initHome);
      } else {
        initHome();
      }
      
      window.addEventListener('load', function() {
        const containers = ['recentArticlesList', 'recentWorksList'];
        containers.forEach(id => {
          const cont = document.getElementById(id);
          if (cont && cont.querySelectorAll('.recent-item').length) attachRecentEvents(cont);
        });
        // 确保不蒜子脚本加载后显示
        if (typeof busuanzi !== 'undefined') busuanzi.fetch();
      });
    })();
    
    function scrollToContent() {
      document.querySelector('.main-content').scrollIntoView({
        behavior: 'smooth'
      });
    }
  </script>
</body>
</html>
