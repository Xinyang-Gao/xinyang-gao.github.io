<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>师恩长卷 · 毕业赠诗集</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="glass-bg"></div>

<!-- ===== 移动端横屏提示 ===== -->
<div class="rotate-hint" id="rotateHint">
    <span>建议横屏浏览 · 获得更佳体验</span>
    <button class="hint-close" id="hintClose">✕</button>
</div>

<div class="app">
    <!-- 左侧导航栏 -->
    <aside class="nav-sidebar" id="navSidebar">
        <div class="nav-header">
            <h2>师恩·长卷</h2>
            <p>毕业赠诗 · 敬呈诸师</p>
            <!-- 汉堡切换按钮（移动端可见） -->
            <button class="nav-toggle" id="navToggle" aria-label="切换导航">
                <span></span><span></span><span></span>
            </button>
        </div>
        <ul class="nav-list" id="navList">
            <!-- 动态js生成导航 -->
        </ul>
        <div class="nav-footer">初三学子 · 敬呈</div>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="main-content" id="mainContent">
        <div class="scroll-wrapper" id="scrollWrapper">
            <div id="dynamicCard"></div>
        </div>
    </main>
</div>

<script src="./script.js"></script>
</body>
</html>
