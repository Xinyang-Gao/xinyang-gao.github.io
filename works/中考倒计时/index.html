<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>中考冲刺 · 新乡伴学同行 | 智慧长周期趋势 · 深色模式</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #F8FAFF;
            --bg-gradient-end: #F0F4FA;
            --text-primary: #1A2C3E;
            --card-bg: rgba(255, 255, 255, 0.96);
            --card-bg-glass: rgba(255, 255, 255, 0.78);
            --card-border: rgba(255, 255, 255, 0.8);
            --accent-blue: #1E40AF;
            --accent-light: #2563EB;
            --badge-bg: rgba(37, 99, 235, 0.08);
            --badge-border: rgba(37, 99, 235, 0.2);
            --badge-text: #2563EB;
            --progress-track: #EFF3FC;
            --progress-fill: linear-gradient(105deg, #3B82F6 0%, #3A7BD5 20%, #60A5FA 80%, #3B82F6 100%);
            --label-bg: rgba(20, 30, 55, 0.72);
            --secondary-text: #5B6E8C;
            --companion-item-bg: #F9FBFE;
            --companion-item-border: rgba(0, 0, 0, 0.02);
            --trend-card-bg: #F9FBFE;
            --trend-border: rgba(59, 130, 246, 0.1);
            --canvas-bg: #FFFFFF;
            --canvas-grid: #E9EFF4;
            --canvas-text: #6B7C93;
            --canvas-line: #3B82F6;
            --canvas-line-home: #F97316;
            --canvas-point: #1E40AF;
            --canvas-point-home: #EA580C;
            --health-tip-bg: #FFF5E8;
            --health-tip-border: #F97316;
            --health-tip-color: #B45309;
            --saying-bg: linear-gradient(105deg, #F0F7FF 0%, #F9FCFF 100%);
            --saying-border-left: #3B82F6;
            --shadow-sm: 0 12px 28px -12px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 16px 32px -14px rgba(0, 0, 0, 0.08);
            --btn-hover: #3B82F6;
            --legend-school-dot: #3B82F6;
            --legend-home-dot: #F97316;
            --card-accent-school: #3B82F6;
            --card-accent-home: #F97316;
        }

        body.dark {
            --bg-gradient-start: #0B1120;
            --bg-gradient-end: #111827;
            --text-primary: #F1F5F9;
            --card-bg: rgba(18, 25, 40, 0.96);
            --card-bg-glass: rgba(15, 23, 42, 0.85);
            --card-border: rgba(51, 65, 85, 0.6);
            --accent-blue: #60A5FA;
            --accent-light: #3B82F6;
            --badge-bg: rgba(59, 130, 246, 0.2);
            --badge-border: rgba(59, 130, 246, 0.4);
            --badge-text: #93C5FD;
            --progress-track: #1E293B;
            --progress-fill: linear-gradient(105deg, #2563EB 0%, #3B82F6 30%, #60A5FA 80%);
            --label-bg: rgba(0, 0, 0, 0.65);
            --secondary-text: #9CA3AF;
            --companion-item-bg: #1E293B;
            --companion-item-border: rgba(255, 255, 255, 0.05);
            --trend-card-bg: #0F172A;
            --trend-border: rgba(59, 130, 246, 0.25);
            --canvas-bg: #0F172A;
            --canvas-grid: #334155;
            --canvas-text: #94A3B8;
            --canvas-line: #60A5FA;
            --canvas-line-home: #FB923C;
            --canvas-point: #93C5FD;
            --canvas-point-home: #FDBA74;
            --health-tip-bg: #2D1F0D;
            --health-tip-border: #F97316;
            --health-tip-color: #FDE68A;
            --saying-bg: linear-gradient(105deg, #111827 0%, #1E293B 100%);
            --saying-border-left: #60A5FA;
            --shadow-sm: 0 12px 28px -12px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 16px 32px -14px rgba(0, 0, 0, 0.5);
            --btn-hover: #3B82F6;
            --legend-school-dot: #60A5FA;
            --legend-home-dot: #FB923C;
            --card-accent-school: #60A5FA;
            --card-accent-home: #FB923C;
        }

        body,
        .time-card,
        .progress-section,
        .companion-section,
        .companion-item,
        .trend-card,
        .saying-box,
        .real-time-card,
        .target-badge,
        .health-tip,
        .theme-toggle,
        .progress-track-wide,
        .progress-fill-wide,
        .greeting-icon,
        .greeting-text,
        .stat-value,
        .stat-label,
        .digit,
        .unit,
        .progress-label-left,
        .progress-percent-right,
        .influence-badge,
        .chart-note,
        .refresh-saying,
        .companion-header h3,
        .hero-title,
        .legend-dot,
        .legend-label,
        .stat-card-accent {
            transition: background-color 0.2s ease-in-out, background 0.2s ease-in-out, border-color 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), color 0.2s ease-out, box-shadow 0.2s ease-out, text-shadow 0.2s ease;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            font-family: system-ui, -apple-system, 'Inter', 'Segoe UI', 'Roboto', sans-serif;
            color: var(--text-primary);
            padding: 2rem 1.5rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            transition: background 0.3s ease, color 0.2s ease;
        }

        .dashboard {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            animation: floatReveal 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes floatReveal {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--card-bg-glass);
            backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            border-radius: 60px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }
        .theme-toggle:hover {
            transform: scale(1.05);
            background: var(--btn-hover);
            color: white;
            border-color: transparent;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-light));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
        }

        .target-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--badge-bg);
            backdrop-filter: blur(2px);
            padding: 0.45rem 1.2rem;
            border-radius: 80px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--badge-text);
            border: 1px solid var(--badge-border);
            width: fit-content;
            margin: 0 auto;
        }

        .real-time-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: var(--card-bg-glass);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.5rem 1.5rem;
            width: fit-content;
            margin: 0.25rem auto 0 auto;
            border: 1px solid var(--card-border);
            box-shadow: 0 6px 14px -8px rgba(0, 0, 0, 0.05);
        }

        .current-time-text {
            font-family: 'Space Grotesk', 'Inter', monospace;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .countdown-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-top: 0.2rem;
        }

        .time-card {
            flex: 1;
            min-width: 130px;
            background: var(--card-bg);
            border-radius: 42px;
            padding: 1.8rem 0.8rem;
            text-align: center;
            transition: transform 0.3s cubic-bezier(0.2, 0.95, 0.4, 1.05), background 0.2s, box-shadow 0.2s, border-color 0.2s;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--card-border);
        }
        .time-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 40px -16px var(--accent-light);
            border-color: var(--accent-light);
        }
        .digit {
            font-family: 'Space Grotesk', 'Inter', monospace;
            font-size: 5.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--accent-light);
            line-height: 1.05;
            transition: color 0.2s ease, text-shadow 0.2s;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.02);
        }
        .unit {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--secondary-text);
            margin-top: 0.75rem;
        }

        .progress-section {
            background: var(--card-bg);
            border-radius: 40px;
            padding: 2rem 1.8rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--card-border);
        }
        .progress-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .progress-item {
            width: 100%;
        }
        .progress-track-wide {
            position: relative;
            width: 100%;
            height: 62px;
            background: var(--progress-track);
            border-radius: 80px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
            transition: background 0.2s ease;
        }
        .progress-fill-wide {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 0%;
            background: var(--progress-fill);
            background-size: 200% 100%;
            border-radius: 80px;
            transition: width 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.2), background 0.2s ease;
        }
        .progress-content {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 0 1.4rem;
            pointer-events: none;
        }
        .progress-label-left {
            font-size: 0.9rem;
            font-weight: 600;
            background: var(--label-bg);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            color: white;
            transition: background 0.2s;
        }
        .progress-percent-right {
            font-family: 'Space Grotesk', monospace;
            font-size: 0.95rem;
            font-weight: 700;
            background: var(--label-bg);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 60px;
            color: white;
        }

        .companion-section {
            background: var(--card-bg);
            border-radius: 44px;
            padding: 1.8rem 2rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--card-border);
        }
        .companion-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.4rem;
            border-bottom: 2px solid rgba(59, 130, 246, 0.3);
            padding-bottom: 0.6rem;
        }
        .companion-header h3 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(120deg, var(--accent-blue), var(--accent-light));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .companion-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .companion-item {
            flex: 1;
            min-width: 150px;
            background: var(--companion-item-bg);
            border-radius: 28px;
            padding: 1rem 1.2rem;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
            border: 1px solid var(--companion-item-border);
        }
        .companion-item:hover {
            background: var(--card-bg);
            transform: translateY(-3px);
        }
        .stat-card-accent {
            width: 100%;
            height: 4px;
            border-radius: 4px;
            margin-bottom: 10px;
            transition: background-color 0.2s ease;
        }
        .stat-card-accent.school {
            background: var(--card-accent-school);
        }
        .stat-card-accent.home {
            background: var(--card-accent-home);
        }
        .greeting-box {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .greeting-icon {
            font-size: 1rem;
            font-weight: 600;
            background: var(--progress-track);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: var(--accent-light);
        }
        .greeting-text {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }
        .timer-badge {
            margin-top: 12px;
            font-family: 'Space Grotesk', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-light);
        }
        .stat-value {
            font-family: 'Space Grotesk', monospace;
            font-weight: 700;
            font-size: 1.8rem;
            color: var(--accent-blue);
            line-height: 1.2;
        }
        .stat-value.school-color {
            color: var(--card-accent-school);
        }
        .stat-value.home-color {
            color: var(--card-accent-home);
        }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--secondary-text);
            margin-top: 0.3rem;
        }
        .stat-note {
            font-size: 0.7rem;
            color: var(--secondary-text);
            margin-top: 6px;
            border-top: 1px dashed var(--progress-track);
            padding-top: 6px;
        }
        .health-tip {
            background: var(--health-tip-bg);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            margin-top: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--health-tip-color);
            border-left: 4px solid var(--health-tip-border);
            transition: background 0.2s, color 0.2s, border-left-color 0.2s;
        }
        .saying-box {
            background: var(--saying-bg);
            border-radius: 32px;
            padding: 1rem 1.5rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .saying-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
            border-left: 3px solid var(--saying-border-left);
            padding-left: 1rem;
            transition: color 0.2s, border-left-color 0.2s;
        }
        .refresh-saying {
            background: rgba(59, 130, 246, 0.15);
            border: none;
            border-radius: 60px;
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent-light);
            cursor: pointer;
            transition: all 0.15s;
        }
        .refresh-saying:hover {
            background: var(--accent-light);
            color: white;
        }

        .trend-card {
            margin-top: 1.2rem;
            background: var(--trend-card-bg);
            border-radius: 28px;
            padding: 0.8rem 1rem 1rem 1rem;
            border: 1px solid var(--trend-border);
            transition: background 0.2s, border 0.2s;
        }
        .trend-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.3rem;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .trend-legend {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--secondary-text);
            margin-bottom: 0.4rem;
        }
        .legend-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 4px;
            transition: background-color 0.2s ease;
        }
        .legend-dot.school {
            background: var(--legend-school-dot);
        }
        .legend-dot.home {
            background: var(--legend-home-dot);
        }
        .legend-label {
            font-size: 0.7rem;
            color: var(--secondary-text);
            transition: color 0.2s ease;
        }
        .influence-badge {
            font-size: 0.7rem;
            background: var(--badge-bg);
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-weight: 500;
            color: var(--badge-text);
        }
        .chart-container {
            width: 100%;
            height: 200px;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: var(--canvas-bg);
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            transition: background 0.2s ease;
        }
        .chart-note {
            font-size: 0.65rem;
            color: var(--secondary-text);
            text-align: right;
            margin-top: 6px;
        }

        .digit-shine {
            animation: modernGlow 0.22s ease-out;
        }
        @keyframes modernGlow {
            0% {
                transform: scale(1);
                text-shadow: 0 0 0 transparent;
            }
            40% {
                transform: scale(1.07);
                color: var(--accent-light);
                text-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
            }
            100% {
                transform: scale(1);
                text-shadow: 0 0 0 transparent;
            }
        }
        .pulse-stat {
            animation: subtleNumberPop 0.3s ease-out;
        }
        @keyframes subtleNumberPop {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }
            70% {
                transform: scale(1.05);
                opacity: 1;
            }
            100% {
                transform: scale(1);
            }
        }
        @media (max-width: 860px) {
            .digit {
                font-size: 4.2rem;
            }
            .time-card {
                min-width: 110px;
                padding: 1.4rem 0.5rem;
            }
            .hero-title {
                font-size: 2.5rem;
            }
            .stat-value {
                font-size: 1.5rem;
            }
            .companion-item {
                min-width: 120px;
                padding: 0.8rem 1rem;
            }
            .chart-container {
                height: 170px;
            }
        }
        @media (max-width: 640px) {
            .companion-grid {
                flex-direction: column;
                gap: 0.8rem;
            }
            .saying-box {
                flex-direction: column;
                align-items: flex-start;
            }
            .refresh-saying {
                align-self: flex-end;
            }
            .digit {
                font-size: 3.4rem;
            }
            .theme-toggle {
                width: 38px;
                height: 38px;
                font-size: 1.2rem;
                top: -10px;
                right: -5px;
            }
            .trend-legend {
                gap: 10px;
                font-size: 0.65rem;
            }
            .chart-container {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="hero-section">
            <div class="theme-toggle" id="themeToggleBtn" aria-label="切换夜间模式" role="button">🌙</div>
            <h1 class="hero-title">中考冲刺</h1>
            <div class="target-badge">距离 6月22日08:20 还有</div>
            <div class="real-time-card">
                <span class="current-time-text" id="liveClockDisplay">--/--/-- --- --:--:--</span>
            </div>
            <div class="countdown-grid">
                <div class="time-card"><div class="digit" id="daysDigit">00</div><div class="unit">天</div></div>
                <div class="time-card"><div class="digit" id="hoursDigit">00</div><div class="unit">时</div></div>
                <div class="time-card"><div class="digit" id="minutesDigit">00</div><div class="unit">分</div></div>
                <div class="time-card"><div class="digit" id="secondsDigit">00</div><div class="unit">秒</div></div>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-grid">
                <div class="progress-item"><div class="progress-track-wide"><div class="progress-fill-wide" id="weekFill"></div><div class="progress-content"><span class="progress-label-left">本周进度</span><span class="progress-percent-right" id="weekPercent">0%</span></div></div></div>
                <div class="progress-item"><div class="progress-track-wide"><div class="progress-fill-wide" id="dayFill"></div><div class="progress-content"><span class="progress-label-left">今天进度</span><span class="progress-percent-right" id="dayPercent">0%</span></div></div></div>
                <div class="progress-item"><div class="progress-track-wide"><div class="progress-fill-wide" id="hourFill"></div><div class="progress-content"><span class="progress-label-left">小时进度</span><span class="progress-percent-right" id="hourPercent">0%</span></div></div></div>
                <div class="progress-item"><div class="progress-track-wide"><div class="progress-fill-wide" id="minuteFill"></div><div class="progress-content"><span class="progress-label-left">分钟进度</span><span class="progress-percent-right" id="minutePercent">0%</span></div></div></div>
            </div>
        </div>

        <div class="companion-section">
            <div class="companion-header">
                <span>⚡</span>
                <h3>伴学同行 · 新乡</h3>
                <span>⚡</span>
            </div>
            <div class="companion-grid">
                <div class="companion-item">
                    <div class="greeting-box">
                        <span class="greeting-icon" id="greetingIcon">时段</span>
                        <span class="greeting-text" id="greetingText">加载中...</span>
                    </div>
                    <div style="margin-top:12px;">
                        <div class="stat-label">专注陪伴时长</div>
                        <div class="timer-badge" id="studyTimerDisplay">00:00:00</div>
                    </div>
                    <div id="lateNightAlert" class="health-tip" style="display:none;">[提醒] 熬夜警示</div>
                </div>
                <div class="companion-item">
                    <div class="stat-card-accent school"></div>
                    <div class="stat-value school-color" id="inSchoolDisplay">--</div>
                    <div class="stat-label">🏠 在校冲刺学生 (实时)</div>
                    <div class="stat-note">含延时·培优·住校晚自习</div>
                </div>
                <div class="companion-item">
                    <div class="stat-card-accent home"></div>
                    <div class="stat-value home-color" id="atHomeDisplay">--</div>
                    <div class="stat-label">📚 在家冲刺学生 (实时)</div>
                    <div class="stat-note">含走读生·周末居家</div>
                </div>
            </div>

            <div class="trend-card">
                <div class="trend-title">
                    <span>📈 近3小时冲刺趋势 (每 5min 聚合)</span>
                    <span class="influence-badge" id="influenceFactorHint">正在实时计算</span>
                </div>
                <div class="trend-legend">
                    <span><span class="legend-dot school"></span><span class="legend-label">在校</span></span>
                    <span><span class="legend-dot home"></span><span class="legend-label">在家</span></span>
                </div>
                <div class="chart-container">
                    <canvas id="trendCanvas" width="800" height="200" style="width:100%;height:200px"></canvas>
                </div>
                <div class="chart-note">每5分钟聚合一次历史数据 | 平滑趋势展示过去3小时在校/在家冲刺热度</div>
            </div>

            <div class="saying-box">
                <div class="saying-text" id="dynamicSaying">星光不负赶路人，江河眷顾奋楫者。</div>
                <button class="refresh-saying" id="refreshSayingBtn">换一句 ↻</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 核心配置 ==========
        const TARGET_DATE = new Date(2026, 5, 22, 8, 20, 0);
        const TOTAL_STUDENTS = 70000;
        const PLAN_TOTAL = 28000;
        const ADMISSION_RATE = PLAN_TOTAL / TOTAL_STUDENTS;
        const COMPETITION_BASE = Math.min(1.48, Math.max(1.0, 1 + (1 - ADMISSION_RATE) * 0.75));

        // 学生分类比例
        const BOARDING_RATIO = 0.22;
        const NON_CITY_RATIO = 0.03;
        const ELITE_CLASS_RATIO = 0.20;
        const DELAY_CLASS_RATIO = 0.90;
        const NORMAL_ONLY_RATIO = 1.0 - DELAY_CLASS_RATIO;

        const LONG_HISTORY_SIZE = 36; //36为3小时，288为24小时
        let chartHistoryData = [];
        let lastSmoothedInSchool = null;
        let lastSmoothedAtHome = null;
        let instantInSchoolQueue = [];
        let instantAtHomeQueue = [];
        let fiveMinInSchoolWindow = [];
        let fiveMinAtHomeWindow = [];

        const daysEl = document.getElementById('daysDigit'),
            hoursEl = document.getElementById('hoursDigit');
        const minutesEl = document.getElementById('minutesDigit'),
            secondsEl = document.getElementById('secondsDigit');
        const inSchoolDisplay = document.getElementById('inSchoolDisplay');
        const atHomeDisplay = document.getElementById('atHomeDisplay');
        const timerDisplay = document.getElementById('studyTimerDisplay');
        const greetingIconSpan = document.getElementById('greetingIcon');
        const greetingTextSpan = document.getElementById('greetingText');
        const sayingElement = document.getElementById('dynamicSaying');
        const lateNightAlertDiv = document.getElementById('lateNightAlert');
        const influenceHintSpan = document.getElementById('influenceFactorHint');
        let canvasEl, canvasCtx;
        let prevDigits = { days: -1, hours: -1, minutes: -1, seconds: -1 };
        let sessionStart = Date.now();
        let longTermInterval = null,
            realtimePeerInterval = null,
            secondTickHandler = null;

        function isSummerSchedule(now) {
            const month = now.getMonth() + 1;
            const day = now.getDate();
            if (month >= 5 && month <= 9) {
                if (month === 5 && day < 1) return false;
                if (month === 9 && day > 30) return false;
                return true;
            }
            return false;
        }

        function getScheduleKeyTimes(now) {
            const isSummer = isSummerSchedule(now);
            const dayOfWeek = now.getDay();
            const isFriday = dayOfWeek === 5;
            const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
            const BOARDING_SLEEP_TIME = 22 * 60;
            if (isSummer) {
                return {
                    schoolStartMin: 7 * 60,
                    schoolStartMax: 7 * 60 + 30,
                    normalEndMin: 17 * 60,
                    normalEndMax: 17 * 60 + 30,
                    delayEndMin: 19 * 60 + 10,
                    delayEndMax: 19 * 60 + 40,
                    eliteEndWeekday: 20 * 60 + 40,
                    eliteEndFriday: 20 * 60 + 20,
                    eliteEndSpecial: 21 * 60,
                    nonCityEnd: 22 * 60,
                    boardingDormTime: 21 * 60 + 30,
                    boardingSleepTime: BOARDING_SLEEP_TIME,
                    isSummer: true,
                    commuteMinutesCity: 18,
                    commuteMinutesNonCity: 40,
                    settleMinutes: 20
                };
            } else {
                return {
                    schoolStartMin: 7 * 60 + 30,
                    schoolStartMax: 8 * 60,
                    normalEndMin: 16 * 60 + 30,
                    normalEndMax: 17 * 60,
                    delayEndMin: 18 * 60 + 40,
                    delayEndMax: 19 * 60 + 10,
                    eliteEndWeekday: 20 * 60 + 10,
                    eliteEndFriday: 19 * 60 + 50,
                    eliteEndSpecial: 20 * 60 + 30,
                    nonCityEnd: 21 * 60 + 30,
                    boardingDormTime: 21 * 60,
                    boardingSleepTime: BOARDING_SLEEP_TIME,
                    isSummer: false,
                    commuteMinutesCity: 16,
                    commuteMinutesNonCity: 35,
                    settleMinutes: 18
                };
            }
        }

        // 【修复1】重排条件顺序：凌晨时段优先判断，彻底消除零点后在家学生数回弹
        function getLateNightStudyRate(totalMinutes) {
            // 凌晨 03:00 - 05:29 → 极低学习率
            if (totalMinutes >= 3 * 60 && totalMinutes < 5 * 60 + 30) return 0.01;
            // 凌晨 01:00 - 03:00 → 很低学习率
            if (totalMinutes >= 1 * 60 && totalMinutes < 3 * 60) return 0.02;
            // 凌晨 00:00 - 01:00 → 低学习率（原先此条件被 <23*60 错误吞掉，现已提前）
            if (totalMinutes < 1 * 60) return 0.06;
            // 深夜 23:00 - 24:00 → 中等偏低
            if (totalMinutes < 24 * 60 && totalMinutes >= 23 * 60) return 0.15;
            // 晚间 05:30 - 22:59 → 正常晚间学习率
            if (totalMinutes < 23 * 60) return 0.35;
            // fallback
            return 0.01;
        }

        // 【修复2】添加过渡带平滑 + 减小深睡噪声幅度
        function calculateStudentDistribution(now) {
            const sched = getScheduleKeyTimes(now);
            const totalMinutes = now.getHours() * 60 + now.getMinutes();
            const dayOfWeek = now.getDay();
            const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

            // 过渡带定义：晚间 21:50-22:10，晨间 05:20-05:40
            const EVENING_TRANS_START = 21 * 60 + 50; // 21:50
            const EVENING_TRANS_END = 22 * 60 + 10; // 22:10
            const MORNING_TRANS_START = 5 * 60 + 20; // 05:20
            const MORNING_TRANS_END = 5 * 60 + 40; // 05:40

            const inEveningTransition = totalMinutes >= EVENING_TRANS_START && totalMinutes <= EVENING_TRANS_END;
            const inMorningTransition = totalMinutes >= MORNING_TRANS_START && totalMinutes <= MORNING_TRANS_END;
            const inTransition = inEveningTransition || inMorningTransition;

            // 过渡带：分别计算深睡和非深睡结果，按权重混合
            if (inTransition) {
                let deepWeight;
                if (inEveningTransition) {
                    // 21:50→0, 22:00→0.5, 22:10→1
                    deepWeight = (totalMinutes - EVENING_TRANS_START) / (EVENING_TRANS_END - EVENING_TRANS_START);
                } else {
                    // 05:20→1, 05:30→0.5, 05:40→0
                    deepWeight = 1 - (totalMinutes - MORNING_TRANS_START) / (MORNING_TRANS_END - MORNING_TRANS_START);
                }
                deepWeight = Math.max(0, Math.min(1, deepWeight));

                const deepResult = computeDeepSleepResult(now, totalMinutes);
                const normalResult = computeNormalResult(now, totalMinutes, dayOfWeek, isWeekend, sched);

                return {
                    inSchool: Math.round(deepResult.inSchool * deepWeight + normalResult.inSchool * (1 - deepWeight)),
                    atHome: Math.round(deepResult.atHome * deepWeight + normalResult.atHome * (1 - deepWeight))
                };
            }

            // 非过渡带：走原有逻辑
            const isDeepSleep = totalMinutes >= (22 * 60) || totalMinutes < (5 * 60 + 30);
            if (isDeepSleep) {
                return computeDeepSleepResult(now, totalMinutes);
            }

            return computeNormalResult(now, totalMinutes, dayOfWeek, isWeekend, sched);
        }

        // 提取深睡时段计算（减小噪声幅度，使曲线更平滑）
        function computeDeepSleepResult(now, totalMinutes) {
            const boardingCount = Math.floor(TOTAL_STUDENTS * BOARDING_RATIO);
            const dayStudentCount = TOTAL_STUDENTS - boardingCount;
            let inSchool = Math.floor(boardingCount * 0.008) + Math.floor(dayStudentCount * 0.002);
            let atHome = Math.floor(dayStudentCount * getLateNightStudyRate(totalMinutes)) +
                Math.floor(boardingCount * 0.01 * getLateNightStudyRate(totalMinutes));
            inSchool = Math.min(TOTAL_STUDENTS, Math.max(15, inSchool));
            atHome = Math.min(TOTAL_STUDENTS, Math.max(40, atHome));
            // 噪声从 ±8% 减小到 ±3.5%，深睡时段曲线更平滑
            const noiseSchool = Math.floor((Math.sin(now.getTime() * 0.0025) * 0.035) * inSchool);
            const noiseHome = Math.floor((Math.cos(now.getTime() * 0.0031) * 0.035) * atHome);
            return {
                inSchool: Math.min(TOTAL_STUDENTS, Math.max(8, inSchool + noiseSchool)),
                atHome: Math.min(TOTAL_STUDENTS, Math.max(30, atHome + noiseHome))
            };
        }

        // 提取非深睡时段计算（原有逻辑完整保留）
        function computeNormalResult(now, totalMinutes, dayOfWeek, isWeekend, sched) {
            const boardingCount = Math.floor(TOTAL_STUDENTS * BOARDING_RATIO);
            const nonCityCount = Math.floor(TOTAL_STUDENTS * NON_CITY_RATIO);
            const dayStudentCount = TOTAL_STUDENTS - boardingCount;
            const normalOnlyCount = Math.floor(TOTAL_STUDENTS * NORMAL_ONLY_RATIO);
            const eliteCount = Math.floor(TOTAL_STUDENTS * ELITE_CLASS_RATIO);
            const delayOnlyCount = Math.floor(TOTAL_STUDENTS * (DELAY_CLASS_RATIO - ELITE_CLASS_RATIO));

            let inSchool = 0,
                atHome = 0;
            const isBoardingAtSchool = (() => {
                if (isWeekend) {
                    if (dayOfWeek === 0 && totalMinutes >= 15 * 60) return true;
                    if (dayOfWeek === 0 && totalMinutes < 15 * 60) return false;
                    if (dayOfWeek === 6 && totalMinutes < 11 * 60) return true;
                    if (dayOfWeek === 6 && totalMinutes >= 11 * 60) return false;
                    return false;
                }
                if (dayOfWeek === 5 && totalMinutes >= 16 * 60 + 30) return false;
                return true;
            })();

            if (isWeekend) {
                const weekendBoardingInSchool = Math.floor(boardingCount * 0.65);
                inSchool = isBoardingAtSchool ? weekendBoardingInSchool : Math.floor(weekendBoardingInSchool * 0.3);
                const weekendStudyRate = (() => {
                    const daysLeft = Math.max(0, (TARGET_DATE - now) / (1000 * 3600 * 24));
                    const baseRate = daysLeft < 30 ? 0.62 : (daysLeft < 60 ? 0.55 : 0.48);
                    if (totalMinutes >= 8 * 60 && totalMinutes < 12 * 60) return baseRate * 1.2;
                    if (totalMinutes >= 14 * 60 && totalMinutes < 17 * 60) return baseRate * 1.15;
                    if (totalMinutes >= 19 * 60 && totalMinutes < 22 * 60) return baseRate * 1.1;
                    if (totalMinutes >= 22 * 60 || totalMinutes < 6 * 60) return baseRate * 0.25;
                    return baseRate;
                })();
                const weekendDayStudentsStudying = Math.floor(dayStudentCount * weekendStudyRate);
                atHome = weekendDayStudentsStudying + Math.floor(boardingCount * 0.35 * weekendStudyRate);
                const noiseSchool = Math.floor((Math.sin(now.getTime() * 0.003) * 0.04 + 0.02) * inSchool);
                const noiseHome = Math.floor((Math.cos(now.getTime() * 0.0037) * 0.04 + 0.02) * atHome);
                inSchool = Math.min(TOTAL_STUDENTS, Math.max(200, inSchool + noiseSchool));
                atHome = Math.min(TOTAL_STUDENTS, Math.max(300, atHome + noiseHome));
                return { inSchool, atHome };
            }

            if (totalMinutes < sched.schoolStartMin) {
                inSchool = isBoardingAtSchool ? Math.floor(boardingCount * 0.9) : Math.floor(boardingCount * 0.2);
                atHome = Math.floor(dayStudentCount * 0.22);
            } else if (totalMinutes < sched.schoolStartMax) {
                const progress = (totalMinutes - sched.schoolStartMin) / (sched.schoolStartMax - sched.schoolStartMin);
                const arrivingStudents = Math.floor(dayStudentCount * progress);
                inSchool = (isBoardingAtSchool ? boardingCount : Math.floor(boardingCount * 0.7)) + arrivingStudents;
                atHome = Math.floor((dayStudentCount - arrivingStudents) * 0.15);
            } else if (totalMinutes < sched.normalEndMin) {
                inSchool = (isBoardingAtSchool ? boardingCount : Math.floor(boardingCount * 0.7)) + Math.floor(
                    dayStudentCount * 0.97);
                atHome = Math.floor(dayStudentCount * 0.02);
            } else if (totalMinutes < sched.normalEndMax) {
                const progress = (totalMinutes - sched.normalEndMin) / (sched.normalEndMax - sched.normalEndMin);
                const normalOnlyLeaving = Math.floor(normalOnlyCount * progress);
                const stillInSchool = dayStudentCount - normalOnlyLeaving;
                inSchool = (isBoardingAtSchool ? boardingCount : Math.floor(boardingCount * 0.7)) + stillInSchool;
                const arrivedHome = Math.floor(normalOnlyLeaving * Math.max(0, progress - 0.3));
                atHome = Math.floor(arrivedHome * 0.6);
            } else if (totalMinutes < sched.delayEndMin) {
                const delayStudents = delayOnlyCount + eliteCount;
                inSchool = (isBoardingAtSchool ? boardingCount : Math.floor(boardingCount * 0.7)) + delayStudents;
                atHome = Math.floor(normalOnlyCount * 0.55);
            } else if (totalMinutes < sched.delayEndMax) {
                const progress = (totalMinutes - sched.delayEndMin) / (sched.delayEndMax - sched.delayEndMin);
                const delayOnlyLeaving = Math.floor(delayOnlyCount * progress);
                const stillInSchool = eliteCount + (delayOnlyCount - delayOnlyLeaving);
                inSchool = (isBoardingAtSchool ? boardingCount : Math.floor(boardingCount * 0.7)) + stillInSchool;
                const arrivedHomeFromDelay = Math.floor(delayOnlyLeaving * Math.max(0, progress - 0.25));
                atHome = Math.floor(normalOnlyCount * 0.62) + Math.floor(arrivedHomeFromDelay * 0.55);
            } else {
                const eliteEndTime = (dayOfWeek === 5) ? sched.eliteEndFriday : sched.eliteEndWeekday;
                if (totalMinutes < eliteEndTime) {
                    inSchool = (isBoardingAtSchool ? boardingCount : Math.floor(boardingCount * 0.7)) + eliteCount;
                    atHome = Math.floor((normalOnlyCount + delayOnlyCount) * 0.7);
                } else if (totalMinutes < sched.eliteEndSpecial) {
                    const specialStillIn = Math.floor(eliteCount * 0.35);
                    inSchool = (isBoardingAtSchool ? boardingCount : Math.floor(boardingCount * 0.7)) + specialStillIn +
                        nonCityCount;
                    atHome = Math.floor((normalOnlyCount + delayOnlyCount + (eliteCount - specialStillIn - nonCityCount)) *
                        0.72);
                } else if (totalMinutes < sched.nonCityEnd) {
                    inSchool = (isBoardingAtSchool ? boardingCount : Math.floor(boardingCount * 0.7)) + nonCityCount;
                    atHome = Math.floor((TOTAL_STUDENTS - inSchool) * 0.68);
                } else {
                    inSchool = isBoardingAtSchool ? Math.floor(boardingCount * 0.4) : Math.floor(boardingCount * 0.2);
                    atHome = Math.floor(dayStudentCount * 0.45);
                }
            }
            const daysLeft = Math.max(0, (TARGET_DATE - now) / (1000 * 3600 * 24));
            const examProximityBoost = daysLeft < 30 ? 1.08 : (daysLeft < 60 ? 1.05 : (daysLeft < 90 ? 1.03 : 1.0));
            atHome = Math.floor(atHome * examProximityBoost);
            const weatherFactor = 0.97 + (Math.sin(now.getDate() * 1.7 + now.getMonth() * 3.1) * 0.04);
            atHome = Math.floor(atHome * weatherFactor);
            const noiseSchool = Math.floor((Math.sin(now.getTime() * 0.0025) * 0.03) * inSchool);
            const noiseHome = Math.floor((Math.cos(now.getTime() * 0.0031) * 0.03) * atHome);
            inSchool = Math.min(TOTAL_STUDENTS, Math.max(150, inSchool + noiseSchool));
            atHome = Math.min(TOTAL_STUDENTS, Math.max(200, atHome + noiseHome));
            return { inSchool, atHome };
        }

        // 【修复3】增强实时EMA平滑：系数从 0.65/0.35 调整为 0.72/0.28
        function pushInstantPrediction() {
            const now = new Date();
            const raw = calculateStudentDistribution(now);
            if (lastSmoothedInSchool === null) lastSmoothedInSchool = raw.inSchool;
            else lastSmoothedInSchool = Math.floor(lastSmoothedInSchool * 0.72 + raw.inSchool * 0.28);
            const finalInSchool = Math.min(TOTAL_STUDENTS, Math.max(100, lastSmoothedInSchool));
            if (lastSmoothedAtHome === null) lastSmoothedAtHome = raw.atHome;
            else lastSmoothedAtHome = Math.floor(lastSmoothedAtHome * 0.72 + raw.atHome * 0.28);
            const finalAtHome = Math.min(TOTAL_STUDENTS, Math.max(100, lastSmoothedAtHome));
            instantInSchoolQueue.push(finalInSchool);
            instantAtHomeQueue.push(finalAtHome);
            if (instantInSchoolQueue.length > 30) instantInSchoolQueue.shift();
            if (instantAtHomeQueue.length > 30) instantAtHomeQueue.shift();
            fiveMinInSchoolWindow.push(finalInSchool);
            fiveMinAtHomeWindow.push(finalAtHome);
            return { inSchool: finalInSchool, atHome: finalAtHome };
        }

        function getCurrentRealtimeInSchool() {
            if (instantInSchoolQueue.length === 0) return Math.floor(TOTAL_STUDENTS * 0.3);
            const sum = instantInSchoolQueue.reduce((a, b) => a + b, 0);
            return Math.round(sum / instantInSchoolQueue.length);
        }

        function getCurrentRealtimeAtHome() {
            if (instantAtHomeQueue.length === 0) return Math.floor(TOTAL_STUDENTS * 0.15);
            const sum = instantAtHomeQueue.reduce((a, b) => a + b, 0);
            return Math.round(sum / instantAtHomeQueue.length);
        }

        function recordLongTermPoint() {
            let avgInSchool = 0,
                avgAtHome = 0;
            if (fiveMinInSchoolWindow.length > 0) {
                avgInSchool = Math.round(fiveMinInSchoolWindow.reduce((a, b) => a + b, 0) / fiveMinInSchoolWindow
                .length);
                avgAtHome = Math.round(fiveMinAtHomeWindow.reduce((a, b) => a + b, 0) / fiveMinAtHomeWindow.length);
            } else {
                avgInSchool = getCurrentRealtimeInSchool();
                avgAtHome = getCurrentRealtimeAtHome();
            }
            fiveMinInSchoolWindow = [];
            fiveMinAtHomeWindow = [];
            chartHistoryData.push({ inSchool: avgInSchool, atHome: avgAtHome, timestamp: Date.now() });
            if (chartHistoryData.length > LONG_HISTORY_SIZE) chartHistoryData.shift();
            drawTrendChart();
            if (influenceHintSpan) {
                const now = new Date();
                const sched = getScheduleKeyTimes(now);
                influenceHintSpan.innerText =
                    `🔥 冲刺系数${COMPETITION_BASE.toFixed(2)}x · ${sched.isSummer ? '夏季' : '冬季'}作息 · 每5min聚合`;
            }
        }

        // 【修复4】fillPastHistory 使用EMA平滑，消除初始锯齿
        function fillPastHistory() {
            chartHistoryData = [];
            const now = new Date();
            let prevInSchool = null,
                prevAtHome = null;
            for (let i = LONG_HISTORY_SIZE - 1; i >= 0; i--) {
                const pointDate = new Date(now.getTime() - (i * 5 * 60 * 1000));
                const raw = calculateStudentDistribution(pointDate);
                // EMA平滑：历史权重0.65，当前权重0.35，让历史曲线更平滑
                if (prevInSchool !== null) {
                    raw.inSchool = Math.floor(prevInSchool * 0.65 + raw.inSchool * 0.35);
                    raw.atHome = Math.floor(prevAtHome * 0.65 + raw.atHome * 0.35);
                }
                prevInSchool = raw.inSchool;
                prevAtHome = raw.atHome;
                chartHistoryData.push({ inSchool: raw.inSchool, atHome: raw.atHome, timestamp: pointDate.getTime() });
            }
        }

        function drawTrendChart() {
            if (!canvasEl || !canvasCtx) return;
            const canvas = canvasEl;
            const ctx = canvasCtx;
            const w = canvas.clientWidth,
                h = canvas.clientHeight;
            canvas.width = w;
            canvas.height = h;
            if (chartHistoryData.length === 0) { ctx.clearRect(0, 0, w, h); return; }
            const allValues = [];
            chartHistoryData.forEach(p => { allValues.push(p.inSchool);
                allValues.push(p.atHome); });
            const maxVal = Math.max(...allValues, 3000);
            const minVal = Math.min(...allValues, 500);
            const range = maxVal - minVal === 0 ? 1 : maxVal - minVal;
            const paddingLeft = 48,
                paddingRight = 20,
                paddingTop = 22,
                paddingBottom = 28;
            const drawW = w - paddingLeft - paddingRight,
                drawH = h - paddingTop - paddingBottom;
            if (drawW <= 0 || drawH <= 0) return;
            ctx.clearRect(0, 0, w, h);
            const gridColor = getComputedStyle(document.body).getPropertyValue('--canvas-grid') || '#E9EFF4';
            const textColor = getComputedStyle(document.body).getPropertyValue('--canvas-text') || '#6B7C93';
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 0.6;
            for (let i = 0; i <= 4; i++) {
                const y = paddingTop + (drawH * i / 4);
                ctx.beginPath();
                ctx.moveTo(paddingLeft, y);
                ctx.lineTo(w - paddingRight, y);
                ctx.stroke();
            }
            ctx.fillStyle = textColor;
            ctx.font = "10px Inter";
            for (let i = 0; i <= 4; i++) {
                const yVal = Math.round(maxVal - (i / 4) * range);
                const y = paddingTop + (drawH * i / 4);
                ctx.fillText(yVal.toLocaleString(), 5, y + 3);
            }
            const labelStep = Math.max(1, Math.floor(chartHistoryData.length / 6));
            for (let i = 0; i < chartHistoryData.length; i += labelStep) {
                const x = paddingLeft + (drawW * i / (chartHistoryData.length - 1));
                const offsetMins = (chartHistoryData.length - 1 - i) * 5;
                let label = offsetMins === 0 ? "现在" : (offsetMins >= 60 ? `-${Math.floor(offsetMins/60)}h` :
                    `-${offsetMins}m`);
                ctx.fillText(label, x - 14, h - paddingBottom + 13);
            }
            const lineColorSchool = getComputedStyle(document.body).getPropertyValue('--canvas-line') || '#3B82F6';
            const lineColorHome = getComputedStyle(document.body).getPropertyValue('--canvas-line-home') || '#F97316';
            const pointColorSchool = getComputedStyle(document.body).getPropertyValue('--canvas-point') || '#1E40AF';
            const pointColorHome = getComputedStyle(document.body).getPropertyValue('--canvas-point-home') || '#EA580C';
            const drawLine = (key, col, ptCol) => {
                ctx.beginPath();
                ctx.strokeStyle = col;
                ctx.lineWidth = 2.2;
                let first = true;
                for (let i = 0; i < chartHistoryData.length; i++) {
                    const x = paddingLeft + (drawW * i / (chartHistoryData.length - 1));
                    const y = paddingTop + drawH - ((chartHistoryData[i][key] - minVal) / range) * drawH;
                    if (first) { ctx.moveTo(x, y);
                        first = false; } else ctx.lineTo(x, y);
                }
                ctx.stroke();
                for (let i = 0; i < chartHistoryData.length; i++) {
                    const x = paddingLeft + (drawW * i / (chartHistoryData.length - 1));
                    const y = paddingTop + drawH - ((chartHistoryData[i][key] - minVal) / range) * drawH;
                    ctx.beginPath();
                    ctx.arc(x, y, 2.8, 0, 2 * Math.PI);
                    ctx.fillStyle = ptCol;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x, y, 1.3, 0, 2 * Math.PI);
                    ctx.fillStyle = "white";
                    ctx.fill();
                }
            };
            drawLine('inSchool', lineColorSchool, pointColorSchool);
            drawLine('atHome', lineColorHome, pointColorHome);
            const last = chartHistoryData[chartHistoryData.length - 1];
            ctx.fillStyle = lineColorSchool;
            ctx.font = "bold 10px 'Space Grotesk'";
            ctx.fillText(`在校:${last.inSchool.toLocaleString()}`, paddingLeft + 4, paddingTop - 4);
            ctx.fillStyle = lineColorHome;
            ctx.fillText(`在家:${last.atHome.toLocaleString()}`, paddingLeft + 120, paddingTop - 4);
        }

        function formatNum(n) { return n < 10 ? `0${n}` : `${n}`; }

        function shineDigit(el) {
            if (!el) return;
            el.classList.remove('digit-shine');
            void el.offsetWidth;
            el.classList.add('digit-shine');
            setTimeout(() => el.classList.remove('digit-shine'), 200);
        }

        function getRemainingTime() {
            const now = new Date();
            const diffMs = TARGET_DATE - now;
            const safeDiff = diffMs <= 0 ? 0 : diffMs;
            const totalSeconds = Math.floor(safeDiff / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            return { days, hours, minutes, seconds, isExpired: diffMs <= 0 };
        }

        function updateCountdownUI({ days, hours, minutes, seconds, isExpired }) {
            let dS = formatNum(days),
                hS = formatNum(hours),
                mS = formatNum(minutes),
                sS = formatNum(seconds);
            if (isExpired) { dS = '00';
                hS = '00';
                mS = '00';
                sS = '00'; }
            if (daysEl.innerText !== dS) { daysEl.innerText = dS; if (prevDigits.days !== days && !isExpired) shineDigit(
                    daysEl); }
            if (hoursEl.innerText !== hS) { hoursEl.innerText = hS; if (prevDigits.hours !== hours && !isExpired) shineDigit(
                    hoursEl); }
            if (minutesEl.innerText !== mS) { minutesEl.innerText = mS; if (prevDigits.minutes !== minutes && !isExpired)
                    shineDigit(minutesEl); }
            if (secondsEl.innerText !== sS) { secondsEl.innerText = sS; if (prevDigits.seconds !== seconds && !isExpired)
                    shineDigit(secondsEl); }
            prevDigits = { days, hours, minutes, seconds };
        }
        const ProgressCalc = {
            getWeekProgress() {
                const now = new Date();
                let daysToMonday = now.getDay() === 0 ? 6 : now.getDay() - 1;
                const monday = new Date(now);
                monday.setDate(now.getDate() - daysToMonday);
                monday.setHours(0, 0, 0, 0);
                const elapsed = now - monday;
                return Math.min(100, (elapsed / (7 * 86400000)) * 100);
            },
            getDayProgress() {
                const now = new Date();
                const start = new Date(now);
                start.setHours(0, 0, 0, 0);
                return Math.min(100, ((now - start) / 86400000) * 100);
            },
            getHourProgress() {
                const now = new Date();
                return Math.min(100, ((now.getMinutes() * 60 + now.getSeconds()) / 3600) * 100);
            },
            getMinuteProgress() { return Math.min(100, (new Date().getSeconds() / 60) * 100); }
        };

        function updateProgressBars() {
            const wp = ProgressCalc.getWeekProgress(),
                dp = ProgressCalc.getDayProgress(),
                hp = ProgressCalc.getHourProgress(),
                mp = ProgressCalc.getMinuteProgress();
            document.getElementById('weekFill').style.width = `${wp}%`;
            document.getElementById('weekPercent').innerText = `${wp.toFixed(1)}%`;
            document.getElementById('dayFill').style.width = `${dp}%`;
            document.getElementById('dayPercent').innerText = `${dp.toFixed(1)}%`;
            document.getElementById('hourFill').style.width = `${hp}%`;
            document.getElementById('hourPercent').innerText = `${hp.toFixed(1)}%`;
            document.getElementById('minuteFill').style.width = `${mp}%`;
            document.getElementById('minutePercent').innerText = `${mp.toFixed(1)}%`;
        }

        function updateLiveClock() {
            const now = new Date();
            const y = now.getFullYear(),
                m = String(now.getMonth() + 1).padStart(2, '0'),
                d = String(now.getDate()).padStart(2, '0');
            const w = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][now.getDay()];
            document.getElementById('liveClockDisplay').innerText =
                `${y}.${m}.${d} ${w} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        }

        function updateStudyTimer() {
            const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
            const hours = Math.floor(elapsed / 3600),
                mins = Math.floor((elapsed % 3600) / 60),
                secs = elapsed % 60;
            if (timerDisplay) timerDisplay.innerText =
                `${hours.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }

        function updateGreetingAndHealth() {
            const now = new Date();
            const hour = now.getHours();
            let icon, text, isLateNight = false;
            if (hour >= 23 || hour < 5) { icon = "[深夜]";
                text = "深夜静心，休息为重，积蓄能量。";
                isLateNight = true; } else if (hour >= 5 && hour < 6) { icon = "[黎明]";
                text = "晨光微熹，早起的人儿最耀眼！"; } else if (hour >= 6 && hour < 8) { icon = "[清晨]";
                text = "一日之计在于晨，大声朗读唤醒大脑！"; } else if (hour >= 8 && hour < 11) { icon = "[上午]";
                text = "专注力巅峰，攻克理科或背诵重点。"; } else if (hour >= 11 && hour < 13) { icon = "[午间]";
                text = "午餐营养均衡，小憩15分钟更高效。"; } else if (hour >= 13 && hour < 15) { icon = "[午后]";
                text = "午后易犯困，起来走动，坚持复习。"; } else if (hour >= 15 && hour < 17) { icon = "[下午]";
                text = "黄金复习区，冲刺重难点！"; } else if (hour >= 17 && hour < 19) { icon = "[傍晚]";
                text = "复盘今日收获，放松片刻再出发。"; } else if (hour >= 19 && hour < 21) { icon = "[晚间]";
                text = "梳理知识框架，效率巅峰时段。"; } else { icon = "[自习]";
                text = "稳住心态，中考加油！"; }
            greetingIconSpan.innerText = icon;
            greetingTextSpan.innerText = text;
            if (lateNightAlertDiv) {
                if (isLateNight) {
                    lateNightAlertDiv.innerHTML = `[提醒] 已经深夜了，保证睡眠能高效复习呦。`;
                    lateNightAlertDiv.style.display = "flex";
                } else lateNightAlertDiv.style.display = "none";
            }
        }

        function updateRealtimePeerDisplay() {
            if (inSchoolDisplay) {
                const realtimeInSchool = getCurrentRealtimeInSchool();
                inSchoolDisplay.innerText = realtimeInSchool.toLocaleString();
                inSchoolDisplay.classList.add('pulse-stat');
                setTimeout(() => inSchoolDisplay.classList.remove('pulse-stat'), 200);
            }
            if (atHomeDisplay) {
                const realtimeAtHome = getCurrentRealtimeAtHome();
                atHomeDisplay.innerText = realtimeAtHome.toLocaleString();
                atHomeDisplay.classList.add('pulse-stat');
                setTimeout(() => atHomeDisplay.classList.remove('pulse-stat'), 200);
            }
        }
        const sayingsPool = ["乾坤未定，你我皆是黑马。", "每一道错题，都是未来的基石。", "坚持到今天，你已经很棒了！", "新乡少年，提笔为剑，决胜中考。", "再微小的努力，乘以365天都会发光。",
            "你笔下写过的每一个字，都不会辜负你。", "现在的痛，终将变成未来的勋章。", "中考是盛夏的果实，请用汗水浇灌。", "和时间赛跑，你就是赢家。", "星光不问赶路人，时光不负有心人。",
            "心态稳住，你就战胜了一半对手。", "偶尔深呼吸，调整节奏再出发。"
        ];
        let currentSayingIdx = -1;

        function randomSaying() {
            let newIdx = Math.floor(Math.random() * sayingsPool.length);
            while (sayingsPool.length > 1 && newIdx === currentSayingIdx) newIdx = Math.floor(Math.random() * sayingsPool
                .length);
            currentSayingIdx = newIdx;
            return sayingsPool[currentSayingIdx];
        }

        function refreshSaying() {
            if (sayingElement) {
                sayingElement.innerText = randomSaying();
                sayingElement.classList.add('pulse-stat');
                setTimeout(() => sayingElement.classList.remove('pulse-stat'), 300);
            }
        }

        function initTheme() {
            const stored = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = stored === 'dark' || (stored === null && prefersDark);
            if (isDark) {
                document.body.classList.add('dark');
                document.getElementById('themeToggleBtn').innerText = '☀️';
            } else {
                document.body.classList.remove('dark');
                document.getElementById('themeToggleBtn').innerText = '🌙';
            }
            if (canvasCtx && chartHistoryData.length) drawTrendChart();
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeToggleBtn');
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                btn.innerText = '🌙';
            } else {
                body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                btn.innerText = '☀️';
            }
            if (canvasCtx && chartHistoryData.length) drawTrendChart();
        }

        function init() {
            canvasEl = document.getElementById('trendCanvas');
            if (canvasEl) canvasCtx = canvasEl.getContext('2d');
            sessionStart = Date.now();
            for (let i = 0; i < 20; i++) pushInstantPrediction();
            fillPastHistory();
            drawTrendChart();
            realtimePeerInterval = setInterval(() => { updateRealtimePeerDisplay(); }, 5000);
            secondTickHandler = setInterval(() => {
                pushInstantPrediction();
                updateCountdownUI(getRemainingTime());
                updateProgressBars();
                updateLiveClock();
                updateStudyTimer();
                updateGreetingAndHealth();
            }, 1000);
            longTermInterval = setInterval(() => { recordLongTermPoint(); }, 5 * 60 * 1000);
            document.getElementById('refreshSayingBtn')?.addEventListener('click', refreshSaying);
            const themeBtn = document.getElementById('themeToggleBtn');
            if (themeBtn) themeBtn.addEventListener('click', toggleTheme);
            window.addEventListener('resize', () => drawTrendChart());
            refreshSaying();
            initTheme();
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    </script>
</body>
