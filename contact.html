<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板 - 高新炀的小站</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/twikoo.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div id="router-view">
    <div class="two-column-layout">
      <aside class="sidebar-profile">
        <div id="personal-card-container"></div>
      </aside>

      <main class="main-content-area">
        <div class="container">
          <h2>留言板</h2>
          <p>欢迎留下你的想法、建议或者随便说点什么~</p>
          <div id="twikoo-comments"></div>
        </div>
      </main>
    </div>
  </div>

  <button id="backToTopBtn" class="back-to-top-btn" title="返回顶部">↑</button>
  <div id="pageTransition" class="page-transition"></div>
  <div id="footer-placeholder"></div>

  <script src="https://kit.fontawesome.com/a3c3c05703.js" crossorigin="anonymous"></script>
  <script src="https://registry.npmmirror.com/twikoo/1.7.11/files/dist/twikoo.nocss.js"></script>
  <script src="/js/vendor/busuanzi.min.js" defer></script>
  <script src="/js/entry/main.js" type="module"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        if (typeof twikoo === 'undefined') {
          console.error('Twikoo 加载失败');
          return;
        }
        twikoo.init({
          envId: 'https://twikoo-gxy.netlify.app/.netlify/functions/twikoo',
          el: '#twikoo-comments',
          lang: 'zh-CN',
          enableComment: true,
        }).then(() => console.log('Twikoo 留言板初始化成功'))
          .catch(err => console.error('Twikoo 初始化失败:', err));
      }, 100);
    });
  </script>
</body>
</html>
