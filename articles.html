<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 - 高新炀的小站</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <!-- 双栏布局 -->
  <div class="two-column-layout">
    <!-- 左侧：个人信息栏 -->
    <aside class="sidebar-profile">
      <div id="personal-card-container"></div>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="main-content-area">
      <div class="container">
        <h2>文章</h2>
<p>这里有一些随便写的作文、技术博客之类的</p>
<div id="search-container">
  <input type="text" id="search-input" placeholder="搜索文章...">
  <select id="search-field">
    <option value="all">全部</option>
    <option value="title">标题</option>
    <option value="tag">标签</option>
    <option value="date">日期</option>
  </select>
</div>
<div id="articles-tags-filter" class="tags-filter">
  <!-- 标签按钮将在这里动态生成 -->
  <span class="filter-label">按标签筛选:</span>
</div>
<div class="articles-list">
    <div id="articles-list-container"></div>
  </div>
      </div>
    </main>
  </div>

  <button id="backToTopBtn" class="back-to-top-btn" title="返回顶部">↑</button>
  <div id="pageTransition" class="page-transition"></div>

  <div id="footer-placeholder"></div>
  <script src="/busuanzi.min.js" defer></script>
  <script src="script.js"></script>
</body>
</html>
