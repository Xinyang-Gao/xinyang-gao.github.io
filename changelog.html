<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>更新日志 - 高新炀的小站</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/pages/changelog.css">
    <!-- 引入 marked 用于 Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div id="loading-overlay" role="status" aria-label="页面加载中"><div class="loading-log"><div>[START] 正在等待 JavaScript，这可能需要几秒</div></div><div class="loading-glow"></div><div id="loading-content"><span class="loading-title">GaoXinYang</span></div></div>
    <div id="navbar-placeholder"></div>
    <div id="router-view">
        <div class="two-column-layout">
            <aside class="sidebar-profile">
                <div id="personal-card-container"></div>
            </aside>
            <main class="main-content-area">
                <div class="container">
                    <h2>📜 更新日志</h2>
                    <p style="margin-bottom: 1.5rem;">记录本站每一次迭代的细节，版本号按语义化规范递增。</p>
                    
                    <!-- 搜索区域 -->
                    <div id="search-container">
                        <input type="text" id="search-input" placeholder="搜索版本号、日期、描述..." class="search-input">
                        <select id="search-field" class="search-select">
                            <option value="all">全部</option>
                            <option value="version">版本号</option>
                            <option value="date">日期</option>
                            <option value="desc">描述</option>
                        </select>
                    </div>
                    
                    <div id="changelog-container">
                        <!-- 动态渲染 -->
                        <p style="text-align:center; padding:2rem;">加载中...</p>
                    </div>
                    
                    <div id="changelog-controls" style="text-align:center; margin:2rem 0;">
                        <button id="load-more-btn" class="btn-primary" style="display:none;">加载更多版本</button>
                        <span id="version-counter" style="font-size:0.9rem; color:var(--text-secondary);"></span>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <div id="footer-placeholder"></div>

    <script src="/js/standalone/changelog.js"></script>
    <script src="https://kit.fontawesome.com/a3c3c05703.js" crossorigin="anonymous"></script>
    <script src="/js/vendor/busuanzi.min.js" defer></script>
    <script src="/js/entry/main.js" type="module"></script>
</body>
</html>
